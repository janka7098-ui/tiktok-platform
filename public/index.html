<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Nexora Panel</title>
<script src="/socket.io/socket.io.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}

body{
background:radial-gradient(circle at top,#111132,#050510);
color:white;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.card{
background:#141428;
padding:40px;
border-radius:20px;
width:380px;
text-align:center;
}

input{
width:100%;
padding:12px;
margin-bottom:12px;
background:#1a1a35;
border:none;
border-radius:8px;
color:white;
}

button{
width:100%;
padding:12px;
background:linear-gradient(90deg,#7b2ff7,#00ff9d);
border:none;
border-radius:8px;
color:white;
cursor:pointer;
font-weight:bold;
}

#dashboard{
display:none;
width:100%;
height:100vh;
flex-direction:column;
}

.topbar{
height:60px;
background:#0e0e1c;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 20px;
border-bottom:1px solid #222;
}

.sidebar{
width:220px;
background:#0e0e1c;
padding:20px;
}

.container{
flex:1;
display:flex;
}

.main{
flex:1;
padding:20px;
overflow:auto;
}

.menu-btn{
width:100%;
padding:10px;
margin-bottom:10px;
background:#1a1a35;
border-radius:8px;
color:white;
cursor:pointer;
}

.section{display:none;}
.section.active{display:block;}

.card-event{
background:#1a1a35;
padding:12px;
border-radius:8px;
margin-bottom:10px;
border-left:4px solid #00ff9d;
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen" class="card">
<h2>NEXORA ACCESS</h2>
<input id="accessKey" placeholder="Clave de acceso">
<input id="tiktokUser" placeholder="Usuario TikTok sin @">
<input id="robloxUser" placeholder="Usuario Roblox">
<button onclick="login()">Entrar</button>
<p id="loginMsg"></p>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

<div class="topbar">
<div>
🟢 Conectado a <strong id="liveUser"></strong>  
| Roblox: <strong id="rbUser"></strong>
</div>

<button onclick="disconnectLive()">Desconectar</button>
</div>

<div class="container">

<div class="sidebar">
<button class="menu-btn" onclick="showSection('chat')">💬 Chat</button>
<button class="menu-btn" onclick="showSection('gifts')">🎁 Regalos</button>
</div>

<div class="main">
<div id="chat" class="section active"></div>
<div id="gifts" class="section"></div>
</div>

</div>
</div>

<script>
const socket = io();

function login(){

const key=document.getElementById("accessKey").value.trim();
const tiktok=document.getElementById("tiktokUser").value.trim();
const roblox=document.getElementById("robloxUser").value.trim();

if(!key || !tiktok || !roblox){
document.getElementById("loginMsg").innerText="Completa todos los campos";
return;
}

socket.emit("validateAndConnect",{
key,
tiktok,
roblox
});
}

socket.on("loginError",(msg)=>{
document.getElementById("loginMsg").innerText=msg;
});

socket.on("connected",(data)=>{

document.getElementById("loginScreen").style.display="none";
document.getElementById("dashboard").style.display="flex";

document.getElementById("liveUser").innerText=data.tiktok;
document.getElementById("rbUser").innerText=data.roblox;

});

/* EVENTOS */

socket.on("chat",(data)=>{
const div=document.createElement("div");
div.className="card-event";
div.innerHTML=`💬 <strong>${data.user}</strong>: ${data.message}`;
document.getElementById("chat").prepend(div);
});

socket.on("gift",(data)=>{
const div=document.createElement("div");
div.className="card-event";
div.innerHTML=`🎁 <strong>${data.user}</strong> envió ${data.gift} x${data.amount}`;
document.getElementById("gifts").prepend(div);
});

/* UI */

function showSection(id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function disconnectLive(){
socket.emit("disconnectLive");
location.reload();
}
</script>

</body>
</html>
