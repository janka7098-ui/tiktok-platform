<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Nexora Panel</title>
<script src="/socket.io/socket.io.js"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:linear-gradient(160deg,#0b0b18,#050510);
color:white;
height:100vh;
display:flex;
}

/* LOGIN */

#loginScreen{
margin:auto;
background:#111126;
padding:40px;
border-radius:20px;
width:380px;
box-shadow:0 0 40px rgba(123,47,247,0.2);
border:1px solid #1f1f3d;
text-align:center;
}

#loginScreen h2{
margin-bottom:20px;
background:linear-gradient(90deg,#7b2ff7,#00ff9d);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* LOGO */

.logo-img{
width:150px;
display:block;
margin:0 auto 20px auto;
}

.sidebar-logo{
width:150px;
margin-bottom:25px;
display:block;
}

input{
width:100%;
padding:12px;
margin-bottom:12px;
background:#1a1a35;
border:1px solid #222;
border-radius:8px;
color:white;
}

button{
width:100%;
padding:12px;
background:linear-gradient(90deg,#7b2ff7,#00ff9d);
border:none;
border-radius:8px;
color:white;
cursor:pointer;
font-weight:bold;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 0 15px #00ff9d;
}

/* DASHBOARD */

#dashboard{
display:none;
flex-direction:column;
width:100%;
height:100vh;
}

.topbar{
height:65px;
background:#0e0e1f;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 25px;
border-bottom:1px solid #1f1f3d;
}

.container{
flex:1;
display:flex;
}

.sidebar{
width:230px;
background:#0c0c1c;
padding:20px;
border-right:1px solid #1f1f3d;
}

.menu-btn{
width:100%;
padding:12px;
margin-bottom:10px;
background:#161633;
border-radius:10px;
color:white;
cursor:pointer;
transition:0.3s;
border:1px solid transparent;
}

.menu-btn:hover{
background:#1f1f3d;
border-color:#7b2ff7;
box-shadow:0 0 10px rgba(123,47,247,0.3);
}

.main{
flex:1;
padding:25px;
overflow:auto;
}

.section{display:none;}
.section.active{display:block;}

.card-event{
background:#161633;
padding:14px;
border-radius:10px;
margin-bottom:12px;
border-left:4px solid #00ff9d;
box-shadow:0 0 10px rgba(0,255,157,0.1);
}

.action-card{
background:#161633;
padding:12px;
border-radius:10px;
margin-bottom:10px;
display:flex;
justify-content:space-between;
align-items:center;
border-left:4px solid #7b2ff7;
}

/* TTS SWITCH */

.tts-container{
display:flex;
align-items:center;
gap:12px;
}

.tts-switch{
width:60px;
height:30px;
background:#333;
border-radius:50px;
position:relative;
cursor:pointer;
transition:0.3s;
}

.tts-switch.active{
background:linear-gradient(90deg,#7b2ff7,#00ff9d);
box-shadow:0 0 10px #00ff9d;
}

.tts-circle{
width:24px;
height:24px;
background:white;
border-radius:50%;
position:absolute;
top:3px;
left:3px;
transition:0.3s;
}

.tts-switch.active .tts-circle{
left:33px;
}

.tts-status{
font-weight:bold;
}

.tts-status.on{
color:#00ff9d;
}

.tts-status.off{
color:#ff4d4d;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen">
<img src="/Logo.png" class="logo-img">
<h2>NEXORA ACCESS</h2>
<input id="accessKey" placeholder="Clave de acceso">
<input id="tiktokUser" placeholder="Usuario TikTok sin @">
<button onclick="validateAndConnect()">Entrar</button>
<p id="loginMsg"></p>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

<div class="topbar">
<div>
🟢 Conectado a <strong id="liveUser"></strong>
</div>

<div style="display:flex; align-items:center; gap:20px;">
<div class="tts-container">
  <div id="ttsToggle" class="tts-switch active" onclick="toggleTTS()">
    <div class="tts-circle"></div>
  </div>
  <span id="ttsText" class="tts-status on">ACTIVADO</span>
</div>

<select id="voiceSelector" style="padding:6px;background:#161633;color:white;border:1px solid #222;border-radius:8px;">
<option>Cargando voces...</option>
</select>

<button onclick="disconnectLive()" style="width:auto;padding:8px 16px;">
Desconectar
</button>
</div>
</div>

<div class="container">

<div class="sidebar">
<img src="/Logo.png" class="sidebar-logo">

<button class="menu-btn" onclick="showSection('chat')">💬 Chat</button>
<button class="menu-btn" onclick="showSection('gifts')">🎁 Regalos</button>
<button class="menu-btn" onclick="showSection('actions')">⚡ Acciones</button>
</div>

<div class="main">

<div id="chat" class="section active"></div>
<div id="gifts" class="section"></div>

<div id="actions" class="section">
<h3 style="margin-bottom:15px;">Crear Acción por Regalo</h3>

<input id="actionGift" placeholder="Nombre exacto del regalo (ej: Rose)">
<input id="actionFile" placeholder="Ruta sonido ej: /media/rosa.mp3">
<button onclick="createAction()">Crear Acción</button>

<br><br>
<h3>Acciones Configuradas</h3>
<div id="actionList"></div>
</div>

</div>
</div>
</div>

<script>
/* TU JS EXACTAMENTE IGUAL — NO LO MODIFIQUÉ */
</script>

</body>
</html>
