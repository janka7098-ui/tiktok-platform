<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexora Ultra | Modo Juego</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700;900&display=swap');
        
        :root {
            --purple: #8A2BE2;
            --cyan: #00FFFF;
            --bg: #050507;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background-color: var(--bg);
            color: #efefef;
            background-image: radial-gradient(circle at 50% -20%, #1a0b2e 0%, var(--bg) 80%);
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .glass {
            background: rgba(15, 15, 22, 0.85);
            backdrop-filter: blur(16px);
            border-radius: 16px;
            border: 1px solid rgba(138, 43, 226, 0.15);
        }

        .neon-text {
            text-shadow: 0 0 15px rgba(0, 255, 255, 0.5);
        }

        .btn-back {
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        .btn-back:hover {
            transform: translateX(-5px);
            color: var(--cyan);
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-4">

    <nav class="fixed top-0 left-0 right-0 p-6 flex justify-between items-center z-50">
        <a href="index.html" class="btn-back flex items-center gap-2 text-zinc-500 font-bold uppercase text-xs tracking-widest">
            <i data-lucide="arrow-left" class="w-4 h-4"></i> Volver al Panel Maestro
        </a>
        <div class="flex items-center gap-3">
            <span id="socket-status" class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></span>
            <span class="text-[10px] uppercase tracking-[3px] font-bold text-zinc-500">Stream Sync</span>
        </div>
    </nav>

    <main class="w-full max-w-5xl aspect-video glass relative overflow-hidden flex flex-col items-center justify-center shadow-[0_0_50px_rgba(0,0,0,0.5)]">
        
        <div id="event-overlay" class="absolute top-10 right-10 pointer-events-none opacity-0 transition-opacity duration-500">
            <div class="glass p-4 border-l-4 border-cyan-500 flex items-center gap-4">
                <div id="event-icon" class="w-10 h-10 bg-cyan-500/20 rounded-full flex items-center justify-center">
                    <i data-lucide="gift" class="text-cyan-400 w-6 h-6"></i>
                </div>
                <div>
                    <p class="text-[10px] text-zinc-500 uppercase font-black">Último Evento</p>
                    <p id="event-text" class="text-sm font-bold text-white tracking-wide">Esperando interacción...</p>
                </div>
            </div>
        </div>

        <div class="text-center">
            <img src="/Logo.png" alt="Logo" class="w-24 mx-auto mb-6 opacity-20 grayscale hover:grayscale-0 transition-all duration-700">
            <h1 class="text-5xl md:text-7xl font-black italic uppercase tracking-tighter neon-text mb-2">
                MODO <span class="text-cyan-500">JUEGO</span>
            </h1>
            <p class="text-zinc-500 tracking-[5px] uppercase text-[10px] font-bold">Nexora Engine v2.0</p>
        </div>

        <div class="absolute bottom-6 w-full px-10 flex justify-between items-end">
            <div class="text-left">
                <p class="text-[9px] text-zinc-600 uppercase font-black tracking-widest mb-1">Estado del Sistema</p>
                <div class="flex gap-2">
                    <div class="h-1 w-8 bg-cyan-500/30 rounded-full"></div>
                    <div class="h-1 w-8 bg-cyan-500/30 rounded-full"></div>
                    <div class="h-1 w-8 bg-zinc-800 rounded-full"></div>
                </div>
            </div>
            <div id="stats" class="text-right">
                <p class="text-cyan-500 font-black text-2xl leading-none">00</p>
                <p class="text-[9px] text-zinc-500 uppercase font-bold">Puntos Acumulados</p>
            </div>
        </div>
    </main>

    <script>
        // Inicializar Iconos
        lucide.createIcons();

        // Configuración de Socket.io
        const socket = io();
        const statusDot = document.getElementById('socket-status');

        socket.on('connect', () => {
            statusDot.classList.replace('bg-red-500', 'bg-green-500');
            console.log("Juego conectado al servidor de Nexora");
        });

        socket.on('disconnect', () => {
            statusDot.classList.replace('bg-green-500', 'bg-red-500');
        });

        // Ejemplo de cómo recibir un regalo en esta página
        socket.on('gift', (data) => {
            const overlay = document.getElementById('event-overlay');
            const text = document.getElementById('event-text');
            
            text.innerText = `${data.nickname} envió ${data.giftName}`;
            overlay.style.opacity = '1';

            // Ocultar después de 5 segundos
            setTimeout(() => {
                overlay.style.opacity = '0';
            }, 5000);
        });
    </script>
</body>
</html>
