<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexora | Avatar Arena Battle</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700;900&display=swap');
        
        body { 
            margin: 0; 
            background: #000; 
            overflow: hidden; 
            font-family: 'Rajdhani', sans-serif; 
        }
        
        canvas { 
            display: block; 
            background: radial-gradient(circle at center, #1a0b2e 0%, #050507 100%); 
        }

        .dev-panel {
            background: rgba(10, 10, 15, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 255, 255, 0.2);
            color: #efefef;
            scrollbar-width: thin;
            scrollbar-color: #8A2BE2 #0a0a0f;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
        }

        .dev-panel h2 {
            font-family: 'Rajdhani', sans-serif;
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
        }

        .btn-dev {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            transition: all 0.2s;
            cursor: pointer;
        }
        .btn-dev:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(0, 255, 255, 0.5);
            transform: scale(1.02);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.2);
        }

        .gift-mapping h3, .skill-meaning h3 {
            color: #FFD700;
            text-transform: uppercase;
            font-weight: 700;
        }
        
        .btn-back {
            background: rgba(10, 10, 15, 0.8);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(0, 255, 255, 0.3);
            transition: all 0.3s;
        }
        .btn-back:hover {
            background: rgba(0, 255, 255, 0.1);
            border-color: #00FFFF;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.4);
            transform: translateX(-5px);
        }
    </style>
</head>
<body>

    <div class="absolute top-6 left-6 pointer-events-auto z-50 flex flex-col items-start gap-4">
        <div>
            <h1 class="text-4xl font-black italic text-cyan-500 uppercase tracking-tighter shadow-black drop-shadow-lg leading-none">
                NEXORA <span class="text-white">ARENA Live</span>
            </h1>
            <div id="status" class="flex items-center gap-2 mt-1">
                <div id="status-dot" class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
                <span id="status-text" class="text-[10px] font-bold text-green-500 uppercase tracking-[4px]">Conectado</span>
            </div>
        </div>
        
        <a href="index.html" class="btn-back flex items-center gap-2 text-cyan-400 px-4 py-2 rounded-lg font-bold uppercase text-xs tracking-widest cursor-pointer text-decoration-none">
            <i data-lucide="arrow-left" class="w-4 h-4"></i> Volver al Panel
        </a>
    </div>

    <aside class="dev-panel absolute top-6 right-6 w-[300px] max-h-[calc(100vh-48px)] p-5 rounded-2xl overflow-y-auto z-50 flex flex-col gap-4">
        
        <section class="border-b border-zinc-700 pb-4">
            <h2 class="text-cyan-400 text-sm tracking-widest mb-3 flex items-center gap-2">
                <i data-lucide="settings" class="w-4 h-4"></i> AJUSTES ARENA
            </h2>
            <div class="flex justify-between items-center text-xs font-bold text-zinc-300 mb-3">
                <label>Puntos Iniciales:</label>
                <input type="number" id="cfg-init-pts" value="50" class="w-16 bg-black/50 border border-cyan-500/50 rounded-lg text-center text-white py-1 outline-none focus:border-cyan-400">
            </div>
            <div class="flex flex-col text-xs font-bold text-zinc-300 gap-1">
                <div class="flex justify-between items-center">
                    <label>Tamaño Arena:</label>
                    <span id="lbl-arena-size" class="text-cyan-400">100%</span>
                </div>
                <input type="range" id="cfg-arena-size" min="0.4" max="1" step="0.05" value="1" class="w-full accent-cyan-500 cursor-pointer mt-1">
            </div>
        </section>

        <section>
            <h2 class="text-cyan-400 text-sm tracking-widest mb-3 flex items-center gap-2">
                <i data-lucide="gamepad-2" class="w-4 h-4"></i> SIMULADOR
            </h2>
            <div class="flex flex-col gap-2 text-white">
                <button onclick="simulateJoin()" class="btn-dev w-full py-2 rounded-lg font-bold text-xs border-cyan-500/50 text-cyan-300">
                    + Simular Entrada
                </button>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="simulateLike()" class="btn-dev py-2 rounded-lg font-bold text-xs border-red-500/50 text-red-300">❤️ Like</button>
                    <button onclick="simulateGift()" class="btn-dev py-2 rounded-lg font-bold text-xs border-yellow-500/50 text-yellow-300">🎁 Regalo</button>
                </div>
                <button onclick="testPower('shoot')" class="btn-dev w-full py-1.5 mt-2 rounded-lg font-bold text-[10px] border-green-500/30">🔫 Forzar Shoot</button>
                <button onclick="testPower('rampage')" class="btn-dev w-full py-1.5 rounded-lg font-bold text-[10px] border-red-500/30">💥 Forzar Rampage</button>
                <button onclick="testPower('storm')" class="btn-dev w-full py-1.5 rounded-lg font-bold text-[10px] border-gray-400/30">🌪️ Forzar Storm</button>
                <button onclick="testPower('shock')" class="btn-dev w-full py-1.5 rounded-lg font-bold text-[10px] border-yellow-500/30">⚡ Forzar Shock</button>
                <button onclick="testPower('blade')" class="btn-dev w-full py-1.5 rounded-lg font-bold text-[10px] border-purple-500/30">⚔️ Forzar Blade</button>
            </div>
        </section>

        <section class="gift-mapping text-sm font-mono space-y-2 border-t border-zinc-800 pt-4">
            <h3>🎁 Regalos -> Efectos</h3>
            <p>1 a 5 Monedas -> 🔫 Shoot</p>
            <p>10 Monedas -> ⚔️ Blade</p>
            <p>20 Monedas -> 💥 Rampage</p>
            <p>50 Monedas -> ⚡ Shock</p>
            <p>100+ Monedas -> 🌪️ Storm</p>
        </section>
    </aside>

    <canvas id="canvas"></canvas>

    <script>
        // --- CONFIGURACIÓN BASE Y VARIABLES GLOBALES ---
        const socket = io(); 
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let avatars = {}; 
        let effects = []; 
        let bullets = []; 
        
        let arenaBox = { x: 0, y: 0, w: 0, h: 0 };
        const COLORS = ["#00FFFF", "#8A2BE2", "#39FF14", "#FF3131", "#FFD700", "#FF00FF"];
        
        let startPoints = 50;
        let arenaScale = 1.0;

        document.getElementById('cfg-init-pts').addEventListener('input', (e) => {
            startPoints = parseInt(e.target.value) || 50;
        });

        document.getElementById('cfg-arena-size').addEventListener('input', (e) => {
            arenaScale = parseFloat(e.target.value);
            document.getElementById('lbl-arena-size').innerText = Math.round(arenaScale * 100) + "%";
            resize();
        });

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            let maxW = canvas.width - 360; 
            let maxH = canvas.height - 144;
            
            arenaBox.w = maxW * arenaScale;
            arenaBox.h = maxH * arenaScale;
            
            arenaBox.x = 24 + (maxW - arenaBox.w) / 2;
            arenaBox.y = 120 + (maxH - arenaBox.h) / 2;

            for (let id in avatars) {
                let a = avatars[id];
                if(a.x - a.radius < arenaBox.x) a.x = arenaBox.x + a.radius;
                if(a.x + a.radius > arenaBox.x + arenaBox.w) a.x = arenaBox.x + arenaBox.w - a.radius;
                if(a.y - a.radius < arenaBox.y) a.y = arenaBox.y + a.radius;
                if(a.y + a.radius > arenaBox.y + arenaBox.h) a.y = arenaBox.y + arenaBox.h - a.radius;
            }
        }
        window.onresize = resize;
        resize();

        // --- SISTEMA DE BALAS ---
        class Bullet {
            constructor(x, y, vx, vy, color, ownerId, dmg) {
                this.x = x; this.y = y;
                this.vx = vx; this.vy = vy;
                this.color = color;
                this.ownerId = ownerId;
                this.dmg = dmg;
                this.radius = 6;
                this.life = 150; 
            }

            update() {
                this.x += this.vx; this.y += this.vy;
                this.life--;
                if (this.x - this.radius < arenaBox.x || this.x + this.radius > arenaBox.x + arenaBox.w) this.vx *= -1;
                if (this.y - this.radius < arenaBox.y || this.y + this.radius > arenaBox.y + arenaBox.h) this.vy *= -1;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = "#FFF";
                ctx.shadowColor = this.color;
                ctx.shadowBlur = 10;
                ctx.fill();
                
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(this.x - this.vx * 3, this.y - this.vy * 3);
                ctx.strokeStyle = this.color;
                ctx.lineWidth = 4;
                ctx.stroke();
                ctx.shadowBlur = 0;
            }
        }

        // --- CLASE JUGADOR (AVATAR) ---
        class Avatar {
            constructor(data) {
                this.id = data.username;
                this.radius = 35; 
                this.x = arenaBox.x + Math.random() * (arenaBox.w - this.radius * 2) + this.radius;
                this.y = arenaBox.y + Math.random() * (arenaBox.h - this.radius * 2) + this.radius; 
                
                this.vx = (Math.random() - 0.5) * 8;
                this.vy = (Math.random() - 0.5) * 8;
                
                this.color = data.color || COLORS[Math.floor(Math.random() * COLORS.length)];
                
                this.points = data.points || startPoints; 
                this.kills = 0; 
                
                // === AQUI ESTÁ LA MAGIA PARA QUE SE VEA EL AVATAR ===
                this.img = new Image();
                this.img.crossOrigin = "Anonymous"; // Permite que el Canvas dibuje la imagen externa sin bloqueos
                
                if (data.profilePic) {
                    // Usamos el proxy para asegurar que la imagen de TikTok no tenga problemas de CORS
                    this.img.src = `/avatar-proxy?url=${encodeURIComponent(data.profilePic)}`;
                } else {
                    this.img.src = `https://api.dicebear.com/7.x/avataaars/svg?seed=${this.id}`;
                }
                
                this.isRampaging = false;
                this.rampageTimer = 0;
                this.hasBlade = false;
                this.bladeTimer = 0;
                this.bladeAngle = 0;
            }

            update() {
                if (this.isRampaging) {
                    this.rampageTimer--;
                    if (this.rampageTimer % 3 === 0) {
                        effects.push({ type: 'trail', x: this.x, y: this.y, color: '#FF3131', life: 15, radius: this.radius });
                    }
                    if (this.rampageTimer <= 0) {
                        this.isRampaging = false;
                        this.vx *= 0.3; 
                        this.vy *= 0.3;
                    }
                } else {
                    let speed = Math.hypot(this.vx, this.vy);
                    if (speed < 2) {
                        this.vx += (Math.random() - 0.5) * 2;
                        this.vy += (Math.random() - 0.5) * 2;
                    }
                    this.vx *= 0.995;
                    this.vy *= 0.995;
                }

                this.x += this.vx;
                this.y += this.vy;

                // Rebotes
                if (this.x + this.radius > arenaBox.x + arenaBox.w) { this.x = arenaBox.x + arenaBox.w - this.radius; this.vx *= -1; }
                if (this.x - this.radius < arenaBox.x) { this.x = arenaBox.x + this.radius; this.vx *= -1; }
                if (this.y + this.radius > arenaBox.y + arenaBox.h) { this.y = arenaBox.y + arenaBox.h - this.radius; this.vy *= -1; }
                if (this.y - this.radius < arenaBox.y) { this.y = arenaBox.y + this.radius; this.vy *= -1; }

                if (this.hasBlade) {
                    this.bladeTimer--;
                    this.bladeAngle += 0.15; 
                    for (let otherId in avatars) {
                        if (otherId !== this.id) {
                            let other = avatars[otherId];
                            let dist = Math.hypot(this.x - other.x, this.y - other.y);
                            if (dist < this.radius + other.radius + 30) {
                                other.takeDamage(1, this.id); 
                            }
                        }
                    }
                    if (this.bladeTimer <= 0) this.hasBlade = false;
                }
            }

            draw() {
                ctx.save();
                
                if (this.hasBlade) {
                    const sawDist = this.radius + 25;
                    for(let i=0; i<3; i++) {
                        let angle = this.bladeAngle + (i * ((Math.PI * 2) / 3));
                        let sawX = this.x + Math.cos(angle) * sawDist;
                        let sawY = this.y + Math.sin(angle) * sawDist;
                        
                        ctx.beginPath();
                        ctx.arc(sawX, sawY, 12, 0, Math.PI * 2);
                        ctx.fillStyle = "#8A2BE2";
                        ctx.shadowColor = "#8A2BE2";
                        ctx.shadowBlur = 10;
                        ctx.fill();
                    }
                }

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius + 4, 0, Math.PI * 2);
                ctx.strokeStyle = this.isRampaging ? "#FF3131" : this.color;
                ctx.lineWidth = this.isRampaging ? 6 : 3;
                ctx.shadowColor = this.isRampaging ? "#FF3131" : this.color;
                ctx.shadowBlur = 15;
                ctx.stroke();
                ctx.closePath();

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.clip();
                // Verificamos que la imagen esté cargada correctamente para dibujarla
                if (this.img.complete && this.img.naturalWidth > 0) {
                    ctx.drawImage(this.img, this.x - this.radius, this.y - this.radius, this.radius * 2, this.radius * 2);
                } else {
                    ctx.fillStyle = "#111"; 
                    ctx.fill();
                }
                ctx.restore();

                ctx.fillStyle = "rgba(0, 0, 0, 0.7)";
                ctx.beginPath();
                ctx.arc(this.x, this.y, 16, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = "white";
                ctx.font = "900 16px Rajdhani";
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.shadowColor = this.color;
                ctx.shadowBlur = 5;
                ctx.fillText(Math.floor(this.points), this.x, this.y);
                ctx.shadowBlur = 0;

                ctx.fillStyle = this.color;
                ctx.font = "bold 13px Rajdhani";
                ctx.strokeStyle = "rgba(0,0,0,0.8)";
                ctx.lineWidth = 3;
                ctx.strokeText(this.id, this.x, this.y + this.radius + 18);
                ctx.fillText(this.id, this.x, this.y + this.radius + 18);

                if (this.kills > 0) {
                    ctx.fillStyle = "#FF3131";
                    ctx.font = "900 16px Rajdhani";
                    ctx.shadowColor = "black";
                    ctx.shadowBlur = 4;
                    ctx.fillText(`💀 ${this.kills}`, this.x, this.y - this.radius - 12);
                }
            }

            takeDamage(amount, attackerId) {
                let wasAlive = this.points > 0;
                this.points -= amount;
                
                if(Math.random() > 0.5 || amount >= 10) { 
                    effects.push({ type: 'text', x: this.x, y: this.y, text: `-${Math.floor(amount)}`, color: '#FF3131', life: 40 });
                }

                if (wasAlive && this.points <= 0 && attackerId && avatars[attackerId]) {
                    avatars[attackerId].kills++;
                }
            }

            addPoints(amount) {
                this.points += amount;
                this.radius = Math.min(60, 35 + (this.points / 100)); 
                effects.push({ type: 'text', x: this.x, y: this.y - this.radius - 20, text: `+${amount}`, color: '#39FF14', life: 40 });
            }
        }

        // --- SISTEMA DE PODERES ---
        function powerShoot(user) {
            let targets = Object.values(avatars).filter(a => a.id !== user.id);
            if (targets.length === 0) return;
            let target = targets[Math.floor(Math.random() * targets.length)];
            let angle = Math.atan2(target.y - user.y, target.x - user.x);
            
            for(let i = -1; i <= 1; i++) {
                let spread = angle + (i * 0.15);
                bullets.push(new Bullet(user.x, user.y, Math.cos(spread) * 12, Math.sin(spread) * 12, "#39FF14", user.id, 15));
            }
        }

        function powerStorm(user) {
            let numBullets = 16;
            for(let i = 0; i < numBullets; i++) {
                let angle = (i * (Math.PI * 2)) / numBullets;
                bullets.push(new Bullet(user.x, user.y, Math.cos(angle) * 8, Math.sin(angle) * 8, "#FFF", user.id, 20));
            }
        }

        function powerShock(user) {
            let range = 350; 
            let hitSomeone = false;
            for (let otherId in avatars) {
                if (otherId !== user.id) {
                    let other = avatars[otherId];
                    let dist = Math.hypot(user.x - other.x, user.y - other.y);
                    if (dist < range) {
                        hitSomeone = true;
                        other.takeDamage(40, user.id); 
                        effects.push({ type: 'lightning', x1: user.x, y1: user.y, x2: other.x, y2: other.y, color: "#FFD700", life: 15 });
                    }
                }
            }
            if(!hitSomeone) effects.push({ type: 'shockwave', x: user.x, y: user.y, color: "#FFD700", radius: range, life: 20 });
        }

        function powerRampage(user) {
            let targets = Object.values(avatars).filter(a => a.id !== user.id);
            if (targets.length === 0) return;
            let target = targets.sort((a,b) => Math.hypot(user.x - a.x, user.y - a.y) - Math.hypot(user.x - b.x, user.y - b.y))[0];
            
            let angle = Math.atan2(target.y - user.y, target.x - user.x);
            user.vx = Math.cos(angle) * 25;
            user.vy = Math.sin(angle) * 25;
            user.isRampaging = true;
            user.rampageTimer = 30; 
        }

        function powerBlade(user) {
            user.hasBlade = true;
            user.bladeTimer = 300; 
        }

        // --- MANEJO DE EVENTOS TIKTOK ---
        function getOrCreatePlayer(username, profilePic) {
            if (!avatars[username]) {
                avatars[username] = new Avatar({ username: username, profilePic: profilePic, points: startPoints });
            }
            return avatars[username];
        }

        socket.on('chat', (data) => getOrCreatePlayer(data.user || data.username, data.avatar));
        socket.on('member', (data) => getOrCreatePlayer(data.user || data.username, data.avatar));

        socket.on('singleLike', (data) => {
            let user = getOrCreatePlayer(data.user || data.username, data.avatar);
            user.addPoints(2); 
        });

        socket.on('gift', (data) => {
            let user = getOrCreatePlayer(data.user || data.username, data.avatar);
            let coins = data.diamondCount || data.diamonds || 1;
            
            user.addPoints(coins * 10); 

            if (coins >= 100) powerStorm(user);
            else if (coins >= 50) powerShock(user);
            else if (coins >= 20) powerRampage(user);
            else if (coins >= 10) powerBlade(user);
            else powerShoot(user); 
        });

        // --- SIMULADORES DEV PANEL ---
        function simulateJoin() {
            const id = "User_" + Math.floor(Math.random()*999);
            getOrCreatePlayer(id, `https://api.dicebear.com/7.x/avataaars/svg?seed=${id}`);
        }

        function simulateLike() {
            let users = Object.values(avatars);
            if(users.length === 0) return;
            let randomUser = users[Math.floor(Math.random() * users.length)];
            randomUser.addPoints(5); 
        }

        function simulateGift() {
            let users = Object.values(avatars);
            if(users.length === 0) return;
            let randomUser = users[Math.floor(Math.random() * users.length)];
            let randomCoins = [1, 10, 20, 50, 100][Math.floor(Math.random() * 5)]; 
            
            randomUser.addPoints(randomCoins * 10);
            
            if (randomCoins >= 100) powerStorm(randomUser);
            else if (randomCoins >= 50) powerShock(randomUser);
            else if (randomCoins >= 20) powerRampage(randomUser);
            else if (randomCoins >= 10) powerBlade(randomUser);
            else powerShoot(randomUser);
        }

        function testPower(powerName) {
            let users = Object.values(avatars);
            if(users.length === 0) return;
            let randomUser = users[Math.floor(Math.random() * users.length)];
            
            if(powerName === 'shoot') powerShoot(randomUser);
            if(powerName === 'rampage') powerRampage(randomUser);
            if(powerName === 'storm') powerStorm(randomUser);
            if(powerName === 'shock') powerShock(randomUser);
            if(powerName === 'blade') powerBlade(randomUser);
        }

        // --- BUCLE PRINCIPAL ---
        function loop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            ctx.strokeStyle = "rgba(0, 255, 255, 0.5)";
            ctx.lineWidth = 3;
            ctx.shadowColor = "rgba(0, 255, 255, 0.8)";
            ctx.shadowBlur = 25;
            ctx.fillStyle = "rgba(10, 10, 15, 0.4)"; 
            ctx.beginPath();
            if (ctx.roundRect) ctx.roundRect(arenaBox.x, arenaBox.y, arenaBox.w, arenaBox.h, 16);
            else ctx.rect(arenaBox.x, arenaBox.y, arenaBox.w, arenaBox.h);
            ctx.fill(); ctx.stroke();
            ctx.restore();

            let avatarList = Object.values(avatars);
            for (let i = 0; i < avatarList.length; i++) {
                for (let j = i + 1; j < avatarList.length; j++) {
                    let a = avatarList[i];
                    let b = avatarList[j];
                    
                    let dx = b.x - a.x;
                    let dy = b.y - a.y;
                    let dist = Math.hypot(dx, dy);
                    let minDist = a.radius + b.radius;

                    if (dist < minDist) {
                        let overlap = minDist - dist;
                        let nx = dx / dist;
                        let ny = dy / dist;
                        
                        a.x -= nx * (overlap / 2);
                        a.y -= ny * (overlap / 2);
                        b.x += nx * (overlap / 2);
                        b.y += ny * (overlap / 2);

                        let isSpecialHit = false;
                        if (a.isRampaging || b.isRampaging) {
                            if (a.isRampaging) { b.takeDamage(100, a.id); a.isRampaging = false; }
                            if (b.isRampaging) { a.takeDamage(100, b.id); b.isRampaging = false; }
                            isSpecialHit = true;
                            effects.push({ type: 'shockwave', x: a.x + dx/2, y: a.y + dy/2, color: '#FF3131', radius: 40, life: 20 });
                        } else {
                            let crashDmg = 10 + Math.floor(Math.random() * 15);
                            a.takeDamage(crashDmg, b.id);
                            b.takeDamage(crashDmg, a.id);
                        }

                        let tx = a.vx; a.vx = b.vx; b.vx = tx;
                        let ty = a.vy; a.vy = b.vy; b.vy = ty;

                        if(!isSpecialHit) {
                            effects.push({ type: 'shockwave', x: a.x + dx/2, y: a.y + dy/2, color: '#FFD700', radius: 25, life: 10 });
                        }
                    }
                }
            }

            for (let id in avatars) {
                avatars[id].update();
                avatars[id].draw();
                
                if (avatars[id].points <= 0) {
                    effects.push({ type: 'shockwave', x: avatars[id].x, y: avatars[id].y, color: avatars[id].color, radius: 100, life: 30 });
                    delete avatars[id];
                }
            }

            for (let i = bullets.length - 1; i >= 0; i--) {
                let b = bullets[i];
                b.update();
                b.draw();

                let hit = false;
                for (let id in avatars) {
                    if (id !== b.ownerId) {
                        let target = avatars[id];
                        if (Math.hypot(b.x - target.x, b.y - target.y) < target.radius + b.radius) {
                            target.takeDamage(b.dmg, b.ownerId); 
                            hit = true;
                            effects.push({ type: 'shockwave', x: b.x, y: b.y, color: b.color, radius: 20, life: 10 });
                            break;
                        }
                    }
                }
                if (hit || b.life <= 0) bullets.splice(i, 1);
            }

            for (let i = effects.length - 1; i >= 0; i--) {
                let e = effects[i];
                e.life--;

                if (e.type === 'lightning') {
                    ctx.beginPath();
                    ctx.moveTo(e.x1, e.y1);
                    ctx.lineTo((e.x1 + e.x2)/2 + (Math.random()-0.5)*50, (e.y1 + e.y2)/2 + (Math.random()-0.5)*50);
                    ctx.lineTo(e.x2, e.y2);
                    ctx.strokeStyle = "white";
                    ctx.lineWidth = 4;
                    ctx.shadowColor = e.color;
                    ctx.shadowBlur = 20;
                    ctx.stroke();
                } else if (e.type === 'text') {
                    ctx.fillStyle = e.color;
                    ctx.globalAlpha = Math.max(0, e.life / 40);
                    ctx.font = "900 28px Rajdhani";
                    ctx.shadowColor = "black";
                    ctx.shadowBlur = 5;
                    ctx.fillText(e.text, e.x, e.y - (45 - e.life)); 
                    ctx.globalAlpha = 1;
                } else if (e.type === 'trail') {
                    ctx.beginPath();
                    ctx.arc(e.x, e.y, e.radius * (e.life/15), 0, Math.PI*2);
                    ctx.fillStyle = `rgba(255, 49, 49, ${e.life/30})`;
                    ctx.fill();
                } else if (e.type === 'shockwave') {
                    ctx.beginPath();
                    ctx.arc(e.x, e.y, e.radius - (e.radius * (e.life/30)), 0, Math.PI*2);
                    ctx.strokeStyle = e.color;
                    ctx.globalAlpha = Math.max(0, e.life / 30);
                    ctx.lineWidth = 5;
                    ctx.stroke();
                    ctx.globalAlpha = 1;
                }

                if (e.life <= 0) effects.splice(i, 1);
            }

            requestAnimationFrame(loop);
        }

        lucide.createIcons();
        loop();
    </script>
</body>
</html>
