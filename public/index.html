<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexora - Panel de Control</title>
    <link rel="icon" type="image/png" href="public/Logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="/socket.io/socket.io.js"></script>

    <style>
        :root {
            --bg-deep: #0F0A1A;
            --bg-card: #1A112A;
            --neon-green: #00FFAB;
            --neon-purple: #8A2EFF;
            --text-main: #FFFFFF;
            --text-muted: #B8B0CC;
            --border-color: rgba(138, 46, 255, 0.2);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 260px;
            background-color: var(--bg-deep);
            border-right: 1px solid var(--border-color);
            padding: 25px;
            display: flex;
            flex-direction: column;
        }

        .logo-container { margin-bottom: 40px; text-align: center; }
        .logo-container img { width: 140px; filter: drop-shadow(0 0 10px var(--neon-purple)); }

        .nav-item {
            padding: 12px 15px;
            color: var(--text-muted);
            text-decoration: none;
            border-radius: 8px;
            margin-bottom: 10px;
            font-weight: 600;
            transition: all 0.3s ease;
            cursor: pointer;
            border: 1px solid transparent;
            background: transparent;
            text-align: left;
            width: 100%;
        }

        .nav-item:hover, .nav-item.active {
            background: linear-gradient(90deg, rgba(138,46,255,0.15) 0%, transparent 100%);
            color: var(--neon-green);
            border-left: 4px solid var(--neon-green);
            border-color: var(--border-color);
        }

        /* --- CONTENIDO --- */
        .main-content { flex: 1; display: flex; flex-direction: column; overflow-y: auto; }
        header {
            background-color: var(--bg-card);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
        }

        .section { display: none; padding: 40px; }
        .section.active { display: block; }

        /* --- GRID DE REGALOS --- */
        #gift-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .gift-card {
            background: var(--bg-card);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            text-align: center;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .gift-card img { width: 50px; height: 50px; margin-bottom: 10px; }
        .gift-card strong { display: block; color: var(--neon-green); }
        .gift-card span { font-size: 0.8rem; color: var(--text-muted); }

        /* --- BOTÓN Y OTROS --- */
        .btn-primary {
            width: 100%; padding: 14px; background: linear-gradient(90deg, var(--neon-purple), #6a1bc2);
            border: none; border-radius: 10px; color: white; font-weight: 800; cursor: pointer;
        }
        input { width: 100%; padding: 14px; margin-top: 8px; margin-bottom: 20px; background: #120b24; border: 1px solid var(--border-color); border-radius: 10px; color: white; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo-container"><img src="public/Logo.png" alt="Nexora"></div>
        <button class="nav-item active" onclick="showSection('conexion')">🔌 Conexión</button>
        <button class="nav-item" onclick="showSection('chat')">💬 Chat en Vivo</button>
        <button class="nav-item" onclick="showSection('gifts')">🎁 Historial de Regalos</button>
    </aside>

    <div class="main-content">
        <header>
            <div id="statusBadge" style="color:#ff4d4d; font-weight:800;">● DESCONECTADO</div>
        </header>

        <main>
            <div id="conexion" class="section active">
                <h1>🔌 Vincular TikTok</h1>
                <div style="max-width: 500px; margin-top:20px;">
                    <input id="tiktokUser" placeholder="Usuario de TikTok">
                    <input id="accessKey" type="password" placeholder="Clave de acceso">
                    <button class="btn-primary" onclick="connectTikTok()">CONECTAR</button>
                </div>
            </div>

            <div id="chat" class="section">
                <h1>💬 Chat en Vivo</h1>
                <div id="chat-container" style="margin-top:20px;"></div>
            </div>

            <div id="gifts" class="section">
                <h1>🎁 Regalos Recibidos</h1>
                <div id="gift-list">
                    </div>
            </div>
        </main>
    </div>

    <script>
        const socket = io();

        function showSection(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        function connectTikTok() {
            const username = document.getElementById("tiktokUser").value.trim();
            const key = document.getElementById("accessKey").value.trim();
            socket.emit("startConnection", { username, key });
        }

        // --- DETECTAR STATUS ---
        socket.on("status", (status) => {
            const badge = document.getElementById("statusBadge");
            if (status === "connected") {
                badge.innerText = "● CONECTADO";
                badge.style.color = "#00FFAB";
            }
        });

        // --- DETECTAR CHAT ---
        socket.on("chat", (data) => {
            const container = document.getElementById("chat-container");
            const div = document.createElement("div");
            div.innerHTML = `<strong>${data.user}:</strong> ${data.message}`;
            container.prepend(div);
        });

        // --- [CLAVE] DETECTAR REGALOS ---
        socket.on("gift", (data) => {
            console.log("Regalo recibido:", data); // Para debug en consola
            const giftList = document.getElementById("gift-list");
            
            const card = document.createElement("div");
            card.className = "gift-card";
            
            // Estructura de la tarjeta de regalo
            card.innerHTML = `
                <img src="${data.giftPictureUrl || 'https://via.placeholder.com/50'}" alt="gift">
                <strong>${data.uniqueId}</strong>
                <span>Envió ${data.giftName} (x${data.repeatCount})</span>
            `;
            
            giftList.prepend(card);

            // Opcional: Hablar cuando llegue un regalo
            const utter = new SpeechSynthesisUtterance(`${data.uniqueId} envió un regalo`);
            window.speechSynthesis.speak(utter);
        });
    </script>
</body>
</html>
