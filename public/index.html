<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Nexora Live Control</title>
<script src="/socket.io/socket.io.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}

body{
    background:linear-gradient(135deg,#0b0b1a,#050510);
    color:white;
    height:100vh;
    overflow:hidden;
}

/* LOGIN */

#login{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.card{
    background:#12122b;
    padding:40px;
    border-radius:20px;
    width:350px;
    text-align:center;
    box-shadow:0 0 40px rgba(0,255,157,0.3);
}

input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    margin:15px 0;
    background:#1d1d3f;
    color:white;
}

button{
    padding:10px 15px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:linear-gradient(90deg,#7b2ff7,#00ff9d);
    color:white;
    font-weight:bold;
}

.status{margin-top:10px;}

/* DASHBOARD */

#dashboard{
    display:none;
    height:100vh;
    display:flex;
}

.sidebar{
    width:220px;
    background:#0e0e20;
    padding:20px;
}

.sidebar button{
    width:100%;
    margin-bottom:10px;
    background:#1c1c3a;
}

.sidebar button:hover{
    background:linear-gradient(90deg,#7b2ff7,#00ff9d);
}

.main{
    flex:1;
    padding:20px;
}

.topbar{
    background:#151535;
    padding:15px;
    border-radius:10px;
    margin-bottom:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.section{
    display:none;
    height:75vh;
    overflow-y:auto;
    background:#151535;
    padding:15px;
    border-radius:10px;
}

.active{display:block;}

.item{
    background:#1d1d40;
    padding:10px;
    border-radius:8px;
    margin-bottom:8px;
    border-left:4px solid #00ff9d;
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
    <div class="card">
        <h2>Nexora Live</h2>
        <input id="username" placeholder="Usuario sin @" />
        <button onclick="connectLive()">Conectar</button>
        <div class="status" id="status">Desconectado</div>
    </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
    <div class="sidebar">
        <button onclick="showSection('chat')">Chat</button>
        <button onclick="showSection('gifts')">Regalos</button>
        <button onclick="toggleTTS()" id="ttsBtn">🔊 TTS ON</button>
        <button onclick="disconnectLive()" style="background:#ff3b3b;">Desconectar</button>
    </div>

    <div class="main">
        <div class="topbar">
            <div>🟢 Conectado a <span id="liveUser"></span></div>
        </div>

        <div id="chat" class="section active"></div>
        <div id="gifts" class="section"></div>
    </div>
</div>

<script>
const socket = io();
let ttsEnabled = true;

/* VOZ */
function speak(text){
    if(!ttsEnabled) return;
    const speech = new SpeechSynthesisUtterance(text);
    speech.lang="es-MX";
    speech.rate=1;
    window.speechSynthesis.speak(speech);
}

/* CONECTAR */
function connectLive(){
    const username=document.getElementById("username").value;
    socket.emit("startConnection",{username});
}

/* DESCONECTAR */
function disconnectLive(){
    socket.emit("disconnectLive");
    location.reload();
}

/* CAMBIAR SECCION */
function showSection(id){
    document.querySelectorAll(".section").forEach(sec=>sec.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

/* TOGGLE TTS */
function toggleTTS(){
    ttsEnabled=!ttsEnabled;
    const btn=document.getElementById("ttsBtn");
    btn.innerText=ttsEnabled?"🔊 TTS ON":"🔇 TTS OFF";
}

/* STATUS */
socket.on("status",(msg)=>{
    if(msg==="connected"){
        document.getElementById("login").style.display="none";
        document.getElementById("dashboard").style.display="flex";
        document.getElementById("liveUser").innerText=document.getElementById("username").value;
    }

    if(msg==="error"){
        document.getElementById("status").innerText="Error al conectar";
    }
});

/* CHAT */
socket.on("chat",(data)=>{
    const div=document.createElement("div");
    div.className="item";
    div.innerHTML=`💬 <strong>${data.user}</strong>: ${data.message}`;
    document.getElementById("chat").prepend(div);

    speak(`${data.user} dice ${data.message}`);
});

/* GIFTS */
socket.on("gift",(data)=>{
    const div=document.createElement("div");
    div.className="item";
    div.innerHTML=`🎁 <strong>${data.user}</strong> envió ${data.gift} x${data.amount}`;
    document.getElementById("gifts").prepend(div);

    speak(`${data.user} envió ${data.gift}`);
});
</script>

</body>
</html>
