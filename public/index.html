<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Nexora Panel</title>
<script src="/socket.io/socket.io.js"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:linear-gradient(160deg,#0b0b18,#050510);
color:white;
height:100vh;
display:flex;
}

/* LOGIN */

#loginScreen{
margin:auto;
background:#111126;
padding:40px;
border-radius:20px;
width:380px;
box-shadow:0 0 40px rgba(123,47,247,0.2);
border:1px solid #1f1f3d;
text-align:center;
}

#loginScreen h2{
margin-bottom:20px;
background:linear-gradient(90deg,#7b2ff7,#00ff9d);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* LOGOS */

.logo-login{
width:120px;
margin-bottom:20px;
}

.logo-sidebar{
width:140px;
margin:0 auto 25px auto;
display:block;
}

/* INPUTS */

input{
width:100%;
padding:12px;
margin-bottom:12px;
background:#1a1a35;
border:1px solid #222;
border-radius:8px;
color:white;
}

button{
width:100%;
padding:12px;
background:linear-gradient(90deg,#7b2ff7,#00ff9d);
border:none;
border-radius:8px;
color:white;
cursor:pointer;
font-weight:bold;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 0 15px #00ff9d;
}

/* DASHBOARD */

#dashboard{
display:none;
flex-direction:column;
width:100%;
height:100vh;
}

.topbar{
height:65px;
background:#0e0e1f;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 25px;
border-bottom:1px solid #1f1f3d;
}

.container{
flex:1;
display:flex;
}

.sidebar{
width:230px;
background:#0c0c1c;
padding:20px;
border-right:1px solid #1f1f3d;
text-align:center;
}

.menu-btn{
width:100%;
padding:12px;
margin-bottom:10px;
background:#161633;
border-radius:10px;
color:white;
cursor:pointer;
transition:0.3s;
border:1px solid transparent;
}

.menu-btn:hover{
background:#1f1f3d;
border-color:#7b2ff7;
box-shadow:0 0 10px rgba(123,47,247,0.3);
}

.main{
flex:1;
padding:25px;
overflow:auto;
}

.section{display:none;}
.section.active{display:block;}

.card-event{
background:#161633;
padding:14px;
border-radius:10px;
margin-bottom:12px;
border-left:4px solid #00ff9d;
box-shadow:0 0 10px rgba(0,255,157,0.1);
}

.action-card{
background:#161633;
padding:12px;
border-radius:10px;
margin-bottom:10px;
display:flex;
justify-content:space-between;
align-items:center;
border-left:4px solid #7b2ff7;
}

/* TTS SWITCH */

.tts-container{
display:flex;
align-items:center;
gap:12px;
}

.tts-switch{
width:60px;
height:30px;
background:#333;
border-radius:50px;
position:relative;
cursor:pointer;
transition:0.3s;
}

.tts-switch.active{
background:linear-gradient(90deg,#7b2ff7,#00ff9d);
box-shadow:0 0 10px #00ff9d;
}

.tts-circle{
width:24px;
height:24px;
background:white;
border-radius:50%;
position:absolute;
top:3px;
left:3px;
transition:0.3s;
}

.tts-switch.active .tts-circle{
left:33px;
}

.tts-status{
font-weight:bold;
}

.tts-status.on{
color:#00ff9d;
}

.tts-status.off{
color:#ff4d4d;
}
</style>
</head>

<body>

<div id="loginScreen">
<img src="/Logo.png" class="logo-login">
<h2>NEXORA ACCESS</h2>
<input id="accessKey" placeholder="Clave de acceso">
<input id="tiktokUser" placeholder="Usuario TikTok sin @">
<button onclick="validateAndConnect()">Entrar</button>
<p id="loginMsg"></p>
</div>

<div id="dashboard">

<div class="topbar">
<div>
🟢 Conectado a <strong id="liveUser"></strong>
</div>

<div style="display:flex; align-items:center; gap:20px;">
<div class="tts-container">
  <div id="ttsToggle" class="tts-switch active" onclick="toggleTTS()">
    <div class="tts-circle"></div>
  </div>
  <span id="ttsText" class="tts-status on">ACTIVADO</span>
</div>

<select id="voiceSelector" style="padding:6px;background:#161633;color:white;border:1px solid #222;border-radius:8px;">
<option>Cargando voces...</option>
</select>

<button onclick="disconnectLive()" style="width:auto;padding:8px 16px;">
Desconectar
</button>
</div>
</div>

<div class="container">

<div class="sidebar">
<img src="/Logo.png" class="logo-sidebar">
<button class="menu-btn" onclick="showSection('chat')">💬 Chat</button>
<button class="menu-btn" onclick="showSection('gifts')">🎁 Regalos</button>
<button class="menu-btn" onclick="showSection('actions')">⚡ Acciones</button>
</div>

<div class="main">

<div id="chat" class="section active"></div>
<div id="gifts" class="section"></div>

<div id="actions" class="section">
<h3 style="margin-bottom:15px;">Crear Acción por Regalo</h3>

<input id="actionGift" placeholder="Nombre exacto del regalo (ej: Rose)">
<input id="actionFile" placeholder="Ruta sonido ej: /media/rosa.mp3">
<button onclick="createAction()">Crear Acción</button>

<br><br>
<h3>Acciones Configuradas</h3>
<div id="actionList"></div>
</div>

</div>
</div>
</div>

<script>
const socket = io();

let tempUsername = "";
let ttsEnabled = true;
let actions = [];
let selectedVoice = null;

/* CARGAR ACCIONES GUARDADAS */
const savedActions = localStorage.getItem("nexora_actions");
if(savedActions){
actions = JSON.parse(savedActions);
}

/* LOGIN */

function validateAndConnect(){
const key=document.getElementById("accessKey").value.trim();
const username=document.getElementById("tiktokUser").value.trim();

if(!key || !username){
document.getElementById("loginMsg").innerText="Completa todos los campos";
return;
}

tempUsername=username;
socket.emit("validateKey", key);
}

socket.on("keyValid",()=>{
socket.emit("startConnection",{ username: tempUsername });
});

socket.on("keyInvalid",()=>{
document.getElementById("loginMsg").innerText="Clave incorrecta";
});

socket.on("status",(status)=>{
if(status==="connected"){
document.getElementById("loginScreen").style.display="none";
document.getElementById("dashboard").style.display="flex";
document.getElementById("liveUser").innerText=tempUsername;
renderActions();
}

if(status==="error"){
document.getElementById("loginMsg").innerText="No se pudo conectar";
}

if(status==="disconnected"){
location.reload();
}
});

/* VOICE SELECTOR */

function loadVoices(){
const voices = speechSynthesis.getVoices();
const selector = document.getElementById("voiceSelector");
selector.innerHTML = "";

voices.forEach((voice,index)=>{
const option = document.createElement("option");
option.value = index;
option.textContent = `${voice.name} (${voice.lang})`;
selector.appendChild(option);
});

if(voices.length>0){
selectedVoice = voices[0];
}
}

speechSynthesis.onvoiceschanged = loadVoices;

document.addEventListener("DOMContentLoaded",()=>{
loadVoices();
renderActions();
document.getElementById("voiceSelector").addEventListener("change",function(){
const voices = speechSynthesis.getVoices();
selectedVoice = voices[this.value];
});
});

/* TTS */

function toggleTTS(){
ttsEnabled=!ttsEnabled;
const toggle=document.getElementById("ttsToggle");
const text=document.getElementById("ttsText");

if(ttsEnabled){
toggle.classList.add("active");
text.innerText="ACTIVADO";
text.classList.remove("off");
text.classList.add("on");
}else{
toggle.classList.remove("active");
text.innerText="DESACTIVADO";
text.classList.remove("on");
text.classList.add("off");
}
}

function speak(text){
if(!ttsEnabled) return;

const speech=new SpeechSynthesisUtterance(text);
if(selectedVoice){ speech.voice = selectedVoice; }

speech.rate = 1;
speech.pitch = 1;
speech.volume = 1;

window.speechSynthesis.speak(speech);
}

/* CHAT */

socket.on("chat",(data)=>{
const div=document.createElement("div");
div.className="card-event";
div.innerHTML=`💬 <strong>${data.user}</strong>: ${data.message}`;
document.getElementById("chat").prepend(div);
speak(`${data.user} dice ${data.message}`);
});

/* REGALOS */

socket.on("gift",(data)=>{
const div=document.createElement("div");
div.className="card-event";
div.innerHTML=`🎁 <strong>${data.user}</strong> envió ${data.gift} x${data.amount}`;
document.getElementById("gifts").prepend(div);
executeAction(data.gift);
});

/* ACCIONES */

function createAction(){
const gift=document.getElementById("actionGift").value.trim();
const file=document.getElementById("actionFile").value.trim();
if(!gift || !file) return;

actions.push({ gift, file });
localStorage.setItem("nexora_actions", JSON.stringify(actions));
renderActions();
}

function renderActions(){
const container=document.getElementById("actionList");
container.innerHTML="";
actions.forEach((a,index)=>{
const div=document.createElement("div");
div.className="action-card";
div.innerHTML=`
<span>🎁 ${a.gift}</span>
<button onclick="deleteAction(${index})" style="width:auto;padding:4px 8px;">❌</button>
`;
container.appendChild(div);
});
}

function deleteAction(index){
actions.splice(index,1);
localStorage.setItem("nexora_actions", JSON.stringify(actions));
renderActions();
}

function executeAction(giftName){
const action=actions.find(a=>a.gift.toLowerCase()===giftName.toLowerCase());
if(!action) return;
const audio=new Audio(action.file);
audio.play().catch(()=>{});
}

function showSection(id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function disconnectLive(){
socket.emit("disconnectLive");
}
</script>

</body>
</html>
