<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Nexora</title>
<link rel="icon" type="image/png" href="Logo.png">
<script src="/socket.io/socket.io.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}
body{background:linear-gradient(160deg,#0b0b18,#050510);color:white;height:100vh;display:flex;}
#dashboard{display:flex;flex-direction:column;width:100%;height:100vh;}

/* TOPBAR */
.topbar{
height:80px;
background:#0e0e1f;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 25px;
border-bottom:1px solid #1f1f3d;
}

.top-logo img{
width:120px;
filter:drop-shadow(0 0 12px #00ff9d);
}

.connection-box{
display:flex;
align-items:center;
gap:12px;
}

.status-dot{
width:10px;height:10px;border-radius:50%;background:#ff4d4d;
}

.status-dot.connected{
background:#00ff9d;
box-shadow:0 0 10px #00ff9d;
}

.profile-frame{
width:42px;height:42px;border-radius:50%;padding:2px;
background:linear-gradient(135deg,#7b2ff7,#00ff9d);
display:none;
}

.profile-frame img{
width:100%;height:100%;border-radius:50%;object-fit:cover;
}

.container{flex:1;display:flex;}

.sidebar{
width:230px;background:#0c0c1c;padding:20px;border-right:1px solid #1f1f3d;
}

.menu-btn{
width:100%;padding:12px;margin-bottom:10px;
background:#161633;border-radius:10px;color:white;
cursor:pointer;border:1px solid transparent;
}

.menu-btn:hover{
background:#1f1f3d;border-color:#7b2ff7;
}

.main{flex:1;padding:25px;}

.section{display:none;}
.section.active{display:block;}

.tts-switch{
width:60px;height:30px;background:#333;border-radius:50px;
position:relative;cursor:pointer;
}

.tts-switch.active{
background:linear-gradient(90deg,#7b2ff7,#00ff9d);
}

.tts-circle{
width:24px;height:24px;background:white;border-radius:50%;
position:absolute;top:3px;left:3px;transition:0.3s;
}

.tts-switch.active .tts-circle{
left:33px;
}

input{
width:100%;padding:12px;margin-bottom:12px;
background:#1a1a35;border:1px solid #222;border-radius:8px;color:white;
}

button{
padding:12px;
background:linear-gradient(90deg,#7b2ff7,#00ff9d);
border:none;border-radius:8px;color:white;
cursor:pointer;font-weight:bold;
}

/* LOADER */

#loader{
position:fixed;
top:0;left:0;width:100%;height:100%;
background:rgba(5,5,16,0.85);
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
display:none;
}

.loader-ring{
width:100px;height:100px;
border:4px solid transparent;
border-top:4px solid #7b2ff7;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
}
</style>
</head>

<body>

<div id="loader">
<div class="loader-ring"></div>
</div>

<div id="dashboard">

<div class="topbar">

<div class="top-logo">
<img src="Logo.png">
</div>

<div class="connection-box">
<span id="statusDot" class="status-dot"></span>
<strong id="connectionStatus">Desconectado</strong>
<span id="connectedUser" style="color:#00ff9d;font-weight:bold;"></span>

<div id="profileFrame" class="profile-frame">
<img id="profileImage">
</div>
</div>

<div style="display:flex;align-items:center;gap:20px;">

<div id="ttsToggle" class="tts-switch active">
<div class="tts-circle"></div>
</div>

<select id="voiceSelector" style="padding:6px;background:#161633;color:white;border:1px solid #222;border-radius:8px;"></select>

<button onclick="disconnectLive()">Desconectar</button>

</div>
</div>

<div class="container">

<div class="sidebar">
<button class="menu-btn" onclick="showSection('conexion')">🔌 Conexión</button>
<button class="menu-btn" onclick="showSection('chat')">💬 Chat</button>
<button class="menu-btn" onclick="showSection('gifts')">🎁 Regalos</button>
</div>

<div class="main">

<div id="conexion" class="section active">
<h2>🔌 Vincular Cuenta TikTok</h2>
<input id="tiktokUser" placeholder="Usuario TikTok sin @">
<input id="accessKey" placeholder="Clave de acceso">
<button onclick="connectTikTok()">Conectar a TikTok LIVE</button>
</div>

<div id="chat" class="section"></div>
<div id="gifts" class="section"></div>

</div>
</div>
</div>

<script>
const socket = io();
let tempUsername="";
let ttsEnabled=true;
let selectedVoice=null;

/* VOICES CORRECTO */

function loadVoices(){
const voices=window.speechSynthesis.getVoices();
const selector=document.getElementById("voiceSelector");
selector.innerHTML="";
voices.forEach((voice,i)=>{
const option=document.createElement("option");
option.value=i;
option.textContent=voice.name+" ("+voice.lang+")";
selector.appendChild(option);
});
if(voices.length>0) selectedVoice=voices[0];
}

speechSynthesis.onvoiceschanged=loadVoices;
window.onload=loadVoices;

document.getElementById("voiceSelector").addEventListener("change",function(){
selectedVoice=speechSynthesis.getVoices()[this.value];
});

/* TTS */

document.getElementById("ttsToggle").addEventListener("click",function(){
ttsEnabled=!ttsEnabled;
this.classList.toggle("active");
});

function speak(text){
if(!ttsEnabled) return;
const utter=new SpeechSynthesisUtterance(text);
if(selectedVoice) utter.voice=selectedVoice;
speechSynthesis.speak(utter);
}

/* LOADER */

function showLoader(){ document.getElementById("loader").style.display="flex"; }
function hideLoader(){ document.getElementById("loader").style.display="none"; }

/* CONEXION */

function connectTikTok(){
const username=document.getElementById("tiktokUser").value.trim();
const key=document.getElementById("accessKey").value.trim();
if(!username||!key){alert("Completa usuario y clave");return;}
tempUsername=username;
showLoader();
socket.emit("startConnection",{username,key});
}

socket.on("status",(status)=>{
if(status==="invalid_key"){hideLoader();alert("Clave inválida");return;}
if(status==="connected"){
hideLoader();
document.getElementById("connectionStatus").innerText="Conectado como";
document.getElementById("connectedUser").innerText=" @"+tempUsername;
document.getElementById("statusDot").classList.add("connected");
}
if(status==="error"){hideLoader();alert("Error al conectar");}
if(status==="disconnected"){
document.getElementById("connectionStatus").innerText="Desconectado";
document.getElementById("connectedUser").innerText="";
document.getElementById("statusDot").classList.remove("connected");
}
});

/* CHAT */

socket.on("chat",(data)=>{
const div=document.createElement("div");
div.innerHTML="💬 <b>"+data.user+"</b>: "+data.message;
document.getElementById("chat").prepend(div);
speak(data.user+" dice "+data.message);
});

/* NAV */

function showSection(id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function disconnectLive(){
socket.emit("disconnectLive");
}
</script>

</body>
</html>
