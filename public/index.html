<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexora Ultra | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&display=swap');
        
        :root {
            --purple: #8A2BE2;
            --green: #39FF14;
            --bg: #050507;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background-color: var(--bg);
            color: #efefef;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% -20%, #1a0b2e 0%, var(--bg) 80%);
        }

        .glass {
            background: rgba(15, 15, 22, 0.9);
            backdrop-filter: blur(12px);
            border-radius: 16px;
            border: 1px solid rgba(138, 43, 226, 0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .glass:hover {
            border-color: var(--green);
            box-shadow: 0 0 30px rgba(57, 255, 20, 0.1);
        }

        #loader {
            position: fixed;
            inset: 0;
            background: rgba(5, 5, 7, 0.98);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(138, 43, 226, 0.1);
            border-left-color: var(--purple);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .mode-btn {
            background: rgba(255,255,255,0.05);
            color: #666;
            transition: all 0.3s;
        }
        .mode-btn.active {
            background: var(--purple);
            color: white;
        }
        .mode-btn.active.webhook-active {
            background: var(--green);
            color: black;
        }

        /* ESTILOS NUEVOS PARA LA TABLA TIPO IMAGEN */
        .table-container {
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 8px;
            overflow: hidden;
        }
        .table-header {
            background: rgba(255,255,255,0.02);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            color: #555;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 10px;
            letter-spacing: 1px;
        }
        .table-row {
            border-bottom: 1px solid rgba(255,255,255,0.03);
            transition: background 0.2s;
        }
        .table-row:hover {
            background: rgba(138, 43, 226, 0.05);
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--purple); border-radius: 10px; }
    </style>
</head>
<body class="p-6">

    <div id="loader">
        <div class="spinner"></div>
        <p class="mt-4 text-purple-500 font-bold tracking-widest animate-pulse uppercase">Procesando Datos...</p>
    </div>

    <nav class="max-w-[1700px] mx-auto mb-8 flex items-center justify-between glass p-6">
        <div class="flex items-center gap-6">
            <div class="relative group">
                <div class="absolute -inset-2 bg-purple-600 rounded-full blur opacity-10 group-hover:opacity-30 transition duration-1000"></div>
                <img src="/Logo.png" alt="Nexora Logo" class="relative h-[90px] w-[90px] object-contain rounded-full bg-black/40 p-1 border border-white/10 shadow-2xl transition-all duration-500 group-hover:scale-105" onerror="this.src='https://via.placeholder.com/90?text=LOGO'">
            </div>
            
            <div class="flex flex-col">
                <h1 class="text-4xl font-black italic tracking-tighter leading-none uppercase">NEXORA <span class="text-purple-500">ULTRA</span></h1>
                <div class="flex items-center gap-2 mt-2">
                    <div id="status-pulse" class="w-2.5 h-2.5 rounded-full bg-red-500 transition-all duration-500"></div>
                    <span id="connection-status" class="text-[11px] uppercase tracking-[4px] text-red-500 font-bold italic">Desconectado</span>
                </div>
            </div>
        </div>

        <div class="flex gap-4 items-center">
            <div class="flex flex-col gap-1">
                <input id="username" type="text" placeholder="@usuario_tiktok" class="bg-black/60 border border-zinc-800 px-4 py-2 rounded-lg text-sm focus:border-purple-500 outline-none w-56 transition-all font-medium">
                <input id="key" type="password" placeholder="Access Key" class="bg-black/60 border border-zinc-800 px-4 py-2 rounded-lg text-sm focus:border-purple-500 outline-none w-56 transition-all font-medium">
            </div>
            <button id="btn-connect" class="bg-purple-600 hover:bg-green-500 text-white hover:text-black px-10 py-5 rounded-xl font-black text-sm transition-all duration-300 shadow-lg shadow-purple-500/20 uppercase tracking-widest active:scale-95">Conectar</button>
            <button id="btn-disconnect" class="hidden bg-zinc-900 border border-red-600 text-red-500 hover:bg-red-600 hover:text-white px-10 py-5 rounded-xl font-black text-sm transition-all duration-300 uppercase tracking-widest active:scale-95">Salir</button>
        </div>
    </nav>

    <main class="max-w-[1700px] mx-auto grid grid-cols-12 gap-8">
        
        <div class="col-span-12 lg:col-span-4 space-y-6">
            <section class="glass p-6">
                <h2 class="text-green-400 font-bold uppercase text-xs mb-4 flex items-center gap-2 italic tracking-widest"><i data-lucide="zap" class="w-4"></i> Nueva Acción</h2>
                
                <div class="flex bg-black/40 p-1 rounded-lg border border-zinc-800 mb-4">
                    <button onclick="setMode('mp3')" id="mode-mp3" class="mode-btn active flex-1 py-2 text-[10px] font-bold uppercase rounded-md">Sonido MP3</button>
                    <button onclick="setMode('link')" id="mode-link" class="mode-btn flex-1 py-2 text-[10px] font-bold uppercase rounded-md">Link Webhook</button>
                </div>

                <div class="space-y-4">
                    <select id="gift-select" class="w-full bg-black/40 border border-zinc-800 p-3 rounded-lg text-sm outline-none focus:border-green-400"></select>
                    
                    <div id="container-mp3">
                        <input type="file" id="file-input" accept="audio/mpeg" class="hidden">
                        <button onclick="document.getElementById('file-input').click()" class="w-full bg-zinc-900 border border-dashed border-zinc-700 p-4 rounded-lg text-xs text-zinc-400 hover:border-purple-500 transition-all flex flex-col items-center gap-2">
                            <i data-lucide="music" class="w-5 h-5 text-purple-500"></i>
                            <span id="file-name">Vincular Audio (.mp3)</span>
                        </button>
                    </div>

                    <div id="container-link" class="hidden">
                        <input id="link-input" type="text" placeholder="https://link-del-servidor.com/api" class="w-full bg-black/60 border border-zinc-800 p-4 rounded-lg text-xs text-green-400 outline-none focus:border-green-500 font-mono">
                    </div>

                    <button id="btn-save-action" class="w-full bg-white text-black font-bold py-3 rounded-lg text-xs uppercase hover:bg-green-500 transition-colors">Vincular Evento</button>
                </div>
            </section>

            <div class="glass flex flex-col h-[400px] overflow-hidden">
                <div class="p-4 border-b border-zinc-900 flex justify-between items-center bg-black/20">
                    <span class="text-xs font-bold tracking-widest italic text-purple-500">LIVE CHAT</span>
                    <input type="checkbox" id="tts-enabled" checked class="accent-green-500 h-4 w-4">
                </div>
                <div id="chat-container" class="flex-1 overflow-y-auto p-4 space-y-4"></div>
            </div>
        </div>

        <div class="col-span-12 lg:col-span-8 space-y-8">
            <section class="glass p-6 min-h-[600px] flex flex-col">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-purple-400 font-bold uppercase text-sm italic tracking-[3px]">Panel de Acciones Configuradas</h2>
                    <span class="text-[10px] text-zinc-500">Mostrando eventos activos en tiempo real</span>
                </div>

                <div class="table-container flex-1 bg-black/20">
                    <div class="table-header grid grid-cols-12 p-3 px-4">
                        <div class="col-span-1">Icono</div>
                        <div class="col-span-3">Nombre del Regalo</div>
                        <div class="col-span-2 text-center">Tipo</div>
                        <div class="col-span-5 pl-4">Descripción / Destino</div>
                        <div class="col-span-1 text-right">Acción</div>
                    </div>

                    <div id="actions-list" class="overflow-y-auto">
                        </div>
                </div>
            </section>
        </div>
    </main>

    <script>
        const socket = io();
        lucide.createIcons();

        let currentMode = 'mp3';

        function setMode(mode) {
            currentMode = mode;
            const btnMp3 = document.getElementById('mode-mp3');
            const btnLink = document.getElementById('mode-link');
            const contMp3 = document.getElementById('container-mp3');
            const contLink = document.getElementById('container-link');

            if(mode === 'mp3') {
                btnMp3.className = "mode-btn active flex-1 py-2 text-[10px] font-bold uppercase rounded-md";
                btnLink.className = "mode-btn flex-1 py-2 text-[10px] font-bold uppercase rounded-md";
                contMp3.classList.remove('hidden');
                contLink.classList.add('hidden');
            } else {
                btnMp3.className = "mode-btn flex-1 py-2 text-[10px] font-bold uppercase rounded-md";
                btnLink.className = "mode-btn active webhook-active flex-1 py-2 text-[10px] font-bold uppercase rounded-md";
                contMp3.classList.add('hidden');
                contLink.classList.remove('hidden');
            }
        }

        const loader = document.getElementById('loader');
        const btnConnect = document.getElementById('btn-connect');
        const statusText = document.getElementById('connection-status');
        const statusPulse = document.getElementById('status-pulse');

        document.getElementById('btn-save-action').onclick = () => {
            const username = document.getElementById('username').value;
            const gift = document.getElementById('gift-select').value;
            if(!username) return alert("Ingresa tu usuario");

            if(currentMode === 'mp3') {
                const fileInput = document.getElementById('file-input');
                const file = fileInput.files[0];
                if(!file) return alert("Selecciona MP3");
                loader.style.display = 'flex';
                const reader = new FileReader();
                reader.onload = (e) => {
                    socket.emit("uploadAndSave", { username, gift, fileName: file.name, fileData: e.target.result });
                    fileInput.value = "";
                    document.getElementById('file-name').innerText = "Vincular Audio (.mp3)";
                };
                reader.readAsDataURL(file);
            } else {
                const link = document.getElementById('link-input').value;
                if(!link) return alert("Ingresa el Link");
                socket.emit("saveAction", { username, action: { gift, file: link, type: 'link' } });
                document.getElementById('link-input').value = "";
            }
        };

        // RENDERIZADO ESTILO TABLA PROFESIONAL
        socket.on("actionsUpdated", (actions) => {
            document.getElementById('actions-list').innerHTML = actions.map((a, i) => `
                <div class="table-row grid grid-cols-12 p-4 px-4 items-center">
                    <div class="col-span-1 flex justify-start">
                        <div class="w-8 h-8 rounded bg-white/5 flex items-center justify-center">
                            <i data-lucide="${a.type === 'link' ? 'globe' : 'music'}" class="w-4 ${a.type === 'link' ? 'text-green-400' : 'text-purple-400'}"></i>
                        </div>
                    </div>
                    <div class="col-span-3 font-bold text-sm text-zinc-100 uppercase tracking-wider">
                        ${a.gift}
                    </div>
                    <div class="col-span-2 text-center">
                        <span class="px-2 py-1 rounded text-[9px] font-black uppercase ${a.type === 'link' ? 'bg-green-500/10 text-green-400 border border-green-500/20' : 'bg-purple-500/10 text-purple-400 border border-purple-500/20'}">
                            ${a.type === 'link' ? 'WEBHOOK' : 'MP3 AUDIO'}
                        </span>
                    </div>
                    <div class="col-span-5 pl-4 truncate text-[11px] font-mono text-zinc-500 italic">
                        ${a.file}
                    </div>
                    <div class="col-span-1 text-right">
                        <button onclick="deleteAction(${i})" class="p-2 hover:bg-red-500/10 rounded-lg group transition-all">
                            <i data-lucide="trash-2" class="w-4 text-zinc-600 group-hover:text-red-500"></i>
                        </button>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        });

        // --- LAS DEMÁS FUNCIONES IGUAL ---
        function deleteAction(index) {
            socket.emit("deleteAction", { username: document.getElementById('username').value, index });
        }

        btnConnect.onclick = () => {
            const username = document.getElementById('username').value;
            const key = document.getElementById('key').value;
            if(!username || !key) return alert("Faltan datos");
            loader.style.display = 'flex';
            socket.emit("startConnection", { username, key });
        };

        socket.on("status", (status) => {
            loader.style.display = 'none';
            if (status === "connected") {
                statusText.innerText = "CONECTADO";
                statusText.className = "text-[11px] uppercase tracking-[4px] text-green-500 font-bold italic";
                statusPulse.className = "w-2.5 h-2.5 rounded-full bg-green-500 animate-ping";
                document.getElementById('btn-connect').classList.add('hidden');
                document.getElementById('btn-disconnect').classList.remove('hidden');
                socket.emit("getActions", document.getElementById('username').value);
            }
        });

        socket.on("chat", (data) => {
            const div = document.createElement('div');
            div.className = "bg-zinc-900/50 p-3 rounded-lg border-l-2 border-purple-500";
            div.innerHTML = `<span class="text-purple-400 font-bold text-xs">${data.user}:</span> <p class="text-sm text-zinc-300">${data.message}</p>`;
            document.getElementById('chat-container').prepend(div);
        });

        socket.on("triggerSound", (fileUrl) => {
            const audio = new Audio(fileUrl);
            audio.volume = document.getElementById('tts-volume').value;
            audio.play();
        });

        fetch('/gift-list').then(r => r.json()).then(d => {
            document.getElementById('gift-select').innerHTML = d.map(g => `<option value="${g.name}">${g.name}</option>`).join('');
        });
    </script>
</body>
</html>
