<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Nexora Panel</title>
<script src="/socket.io/socket.io.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}

body{
background:radial-gradient(circle at top,#111132,#050510);
color:white;
height:100vh;
overflow:hidden;
}

#dashboard{display:none;height:100vh;flex-direction:column;}

.topbar{
height:60px;
background:#0e0e1c;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 20px;
border-bottom:1px solid #222;
}

.status{
display:flex;
align-items:center;
gap:10px;
}

.dot{
width:12px;
height:12px;
border-radius:50%;
background:#00ff9d;
}

.tts-btn{
background:#1a1a35;
padding:8px 14px;
border-radius:8px;
cursor:pointer;
}

.tts-btn.active{
background:linear-gradient(90deg,#7b2ff7,#00ff9d);
}

.container{
flex:1;
display:flex;
}

.sidebar{
width:220px;
background:#0e0e1c;
padding:20px;
}

.menu-btn{
width:100%;
padding:10px;
margin-bottom:10px;
background:#1a1a35;
border-radius:8px;
color:white;
cursor:pointer;
}

.main{
flex:1;
padding:20px;
overflow-y:auto;
}

.section{display:none;}
.section.active{display:block;}

.card-event{
background:#1a1a35;
padding:12px;
border-radius:8px;
margin-bottom:10px;
border-left:4px solid #00ff9d;
}

input, select{
width:100%;
padding:10px;
margin-bottom:10px;
background:#1a1a35;
border:none;
border-radius:6px;
color:white;
}

button{
padding:10px;
background:linear-gradient(90deg,#7b2ff7,#00ff9d);
border:none;
border-radius:6px;
color:white;
cursor:pointer;
}

</style>
</head>
<body>

<div id="dashboard">

<div class="topbar">
<div class="status">
<div class="dot"></div>
<div>Conectado a <strong id="liveUser"></strong></div>
</div>

<div id="ttsToggle" class="tts-btn active" onclick="toggleTTS()">
🔊 TTS ACTIVADO
</div>
</div>

<div class="container">

<div class="sidebar">
<button class="menu-btn" onclick="showSection('chat')">💬 Chat</button>
<button class="menu-btn" onclick="showSection('gifts')">🎁 Regalos</button>
<button class="menu-btn" onclick="showSection('actions')">⚡ Acciones</button>
<button class="menu-btn" onclick="disconnectLive()">⛔ Desconectar</button>
</div>

<div class="main">

<div id="chat" class="section active"></div>
<div id="gifts" class="section"></div>

<div id="actions" class="section">

<h3>Crear Acción</h3>

<input id="actionGift" placeholder="Nombre exacto del regalo (ej: Rose)">
<input id="actionAmount" type="number" value="1" placeholder="Cantidad mínima">

<select id="actionType">
<option value="sound">Sonido</option>
<option value="animation">Animación</option>
</select>

<input id="actionFile" placeholder="Ej: /media/rosa.mp3">
<button onclick="createAction()">Crear Acción</button>

<br><br>
<h3>Acciones Configuradas</h3>
<div id="actionList"></div>

</div>

</div>
</div>
</div>

<script>
const socket = io();
let actions = [];
let ttsEnabled = true;

/* SIMULAMOS CONEXIÓN YA ACTIVA */
document.getElementById("dashboard").style.display="flex";
document.getElementById("liveUser").innerText="marciita_gg";

/* TTS */

function toggleTTS(){
ttsEnabled = !ttsEnabled;
const btn=document.getElementById("ttsToggle");

if(ttsEnabled){
btn.classList.add("active");
btn.innerText="🔊 TTS ACTIVADO";
}else{
btn.classList.remove("active");
btn.innerText="🔇 TTS DESACTIVADO";
}
}

function speak(text){
if(!ttsEnabled) return;
const speech=new SpeechSynthesisUtterance(text);
speech.lang="es-MX";
window.speechSynthesis.speak(speech);
}

/* SECCIONES */

function showSection(id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

/* EVENTOS */

socket.on("chat",(data)=>{
const div=document.createElement("div");
div.className="card-event";
div.innerHTML=`💬 <strong>${data.user}</strong>: ${data.message}`;
document.getElementById("chat").prepend(div);
speak(`${data.user} dice ${data.message}`);
});

socket.on("gift",(data)=>{
const div=document.createElement("div");
div.className="card-event";
div.innerHTML=`🎁 <strong>${data.user}</strong> envió ${data.gift} x${data.amount}`;
document.getElementById("gifts").prepend(div);

executeAction(data.gift, data.amount);
});

/* ACCIONES */

function createAction(){
const gift=document.getElementById("actionGift").value.trim();
const minAmount=parseInt(document.getElementById("actionAmount").value);
const type=document.getElementById("actionType").value;
const file=document.getElementById("actionFile").value.trim();

if(!gift || !file) return;

actions.push({
id:Date.now(),
gift,
minAmount,
type,
file,
enabled:true
});

renderActions();
}

function renderActions(){
const container=document.getElementById("actionList");
container.innerHTML="";

actions.forEach(a=>{
const div=document.createElement("div");
div.className="card-event";
div.innerHTML=`🎁 ${a.gift} (x${a.minAmount}) → ${a.type}`;
container.appendChild(div);
});
}

function executeAction(giftName, amount){

const action=actions.find(a=>
a.enabled &&
a.gift.toLowerCase()===giftName.toLowerCase() &&
amount>=a.minAmount
);

if(!action) return;

if(action.type==="sound"){
const audio=new Audio(action.file);
audio.volume=1;
audio.play().catch(err=>console.log("Error audio:",err));
}

if(action.type==="animation"){
alert(`✨ ${giftName} x${amount} ✨`);
}
}

function disconnectLive(){
location.reload();
}
</script>

</body>
</html>
