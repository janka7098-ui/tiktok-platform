<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexora Ultra | Live Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&display=swap');
        
        :root {
            --purple: #8A2BE2;
            --green: #39FF14;
            --bg: #050507;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background-color: var(--bg);
            color: #efefef;
            overflow-x: hidden;
        }

        /* --- EFECTO DE BRILLO AL PASAR EL MOUSE --- */
        .glass {
            background: rgba(15, 15, 22, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            border: 1px solid rgba(138, 43, 226, 0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .glass:hover {
            border-color: var(--green);
            box-shadow: 0 0 25px rgba(57, 255, 20, 0.15), inset 0 0 10px rgba(57, 255, 20, 0.05);
            transform: translateY(-2px);
        }

        /* --- PANTALLA DE CARGA --- */
        #loader {
            position: fixed;
            inset: 0;
            background: rgba(5, 5, 7, 0.95);
            display: none; /* Se activa con JS */
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            backdrop-filter: blur(20px);
        }

        .spinner {
            width: 80px;
            height: 80px;
            border: 4px solid rgba(138, 43, 226, 0.1);
            border-left-color: var(--purple);
            border-right-color: var(--green);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            margin-top: 20px;
            letter-spacing: 5px;
            animation: pulse-text 1.5s infinite;
            font-weight: bold;
            color: var(--purple);
        }

        @keyframes pulse-text {
            0%, 100% { opacity: 1; text-shadow: 0 0 10px var(--purple); }
            50% { opacity: 0.3; text-shadow: none; }
        }

        /* --- SCROLLBAR --- */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: linear-gradient(var(--purple), var(--green)); border-radius: 10px; }

        .btn-action {
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .btn-action:active { transform: scale(0.95); }
    </style>
</head>
<body class="p-6">

    <div id="loader">
        <div class="spinner"></div>
        <div class="loading-text uppercase italic">Estableciendo Conexión...</div>
        <p class="text-[10px] text-zinc-500 mt-2 font-mono" id="loader-subtext">Sincronizando con TikTok Live Connector</p>
    </div>

    <nav class="max-w-[1700px] mx-auto mb-8 flex items-center justify-between glass p-5">
        <div class="flex items-center gap-4">
            <img src="/logo.png" alt="Logo" class="h-12 w-auto transition-transform hover:scale-110 duration-300" onerror="this.src='https://via.placeholder.com/48?text=N'">
            <div>
                <h1 class="text-3xl font-black italic tracking-tighter leading-none">NEXORA <span class="text-purple-500">ULTRA</span></h1>
                <span id="connection-status" class="text-[9px] uppercase tracking-[3px] text-red-500 font-bold">Desconectado</span>
            </div>
        </div>

        <div class="flex gap-4 items-center">
            <div class="flex flex-col">
                <input id="username" type="text" placeholder="@usuario" class="bg-black/50 border border-zinc-800 px-4 py-2 rounded-t-lg text-sm focus:border-purple-500 outline-none transition-colors">
                <input id="key" type="password" placeholder="Access Key" class="bg-black/50 border border-zinc-800 px-4 py-2 rounded-b-lg text-sm focus:border-purple-500 outline-none transition-colors">
            </div>
            <button id="btn-connect" class="bg-purple-600 hover:bg-green-500 text-white hover:text-black h-full px-8 rounded-xl font-black transition-all duration-300 shadow-lg shadow-purple-500/20">CONECTAR</button>
            <button id="btn-disconnect" class="hidden bg-zinc-900 border border-red-600 text-red-500 hover:bg-red-600 hover:text-white h-full px-8 rounded-xl font-black transition-all duration-300">SALIR</button>
        </div>
    </nav>

    <main class="max-w-[1700px] mx-auto grid grid-cols-12 gap-8">
        
        <div class="col-span-12 lg:col-span-3 space-y-8">
            <section class="glass p-6">
                <h2 class="text-green-400 font-bold uppercase text-xs mb-4 flex items-center gap-2">
                    <i data-lucide="zap" class="w-4"></i> Crear Evento
                </h2>
                <div class="space-y-4">
                    <select id="gift-select" class="w-full bg-black/40 border border-zinc-800 p-3 rounded-lg text-sm"></select>
                    <input id="sound-file" type="text" placeholder="nombre_archivo.mp3" class="w-full bg-black/40 border border-zinc-800 p-3 rounded-lg text-sm">
                    <button id="btn-save-action" class="w-full bg-white text-black font-bold py-3 rounded-lg text-xs uppercase hover:bg-green-500 transition-colors">Vincular Sonido</button>
                </div>
            </section>

            <section class="glass p-6 h-[450px] flex flex-col">
                <h2 class="text-purple-400 font-bold uppercase text-xs mb-4">Eventos Activos</h2>
                <div id="actions-list" class="flex-1 overflow-y-auto space-y-2 pr-2"></div>
            </section>
        </div>

        <div class="col-span-12 lg:col-span-6 grid grid-cols-1 md:grid-cols-2 gap-8 h-[700px]">
            <div class="glass flex flex-col">
                <div class="p-4 border-b border-zinc-900 flex justify-between items-center bg-black/20">
                    <span class="text-xs font-bold tracking-widest"><i data-lucide="message-square" class="inline w-3 mr-1 text-purple-500"></i> CHAT</span>
                    <input type="checkbox" id="tts-enabled" checked class="accent-green-500">
                </div>
                <div id="chat-container" class="flex-1 overflow-y-auto p-4 space-y-4"></div>
            </div>

            <div class="glass flex flex-col">
                <div class="p-4 border-b border-zinc-900 bg-black/20">
                    <span class="text-xs font-bold tracking-widest text-green-400"><i data-lucide="star" class="inline w-3 mr-1"></i> REGALOS RECIENTES</span>
                </div>
                <div id="gift-container" class="flex-1 overflow-y-auto p-4 space-y-4"></div>
            </div>
        </div>

        <div class="col-span-12 lg:col-span-3 space-y-8">
            <section class="glass p-6">
                <h2 class="text-xs font-bold uppercase mb-4 text-zinc-500">Control de Voz</h2>
                <select id="tts-voice" class="w-full bg-black/40 border border-zinc-800 p-2 rounded text-[11px] mb-3"></select>
                <input id="tts-volume" type="range" min="0" max="1" step="0.1" value="0.7" class="w-full accent-purple-600">
            </section>

            <section class="glass flex flex-col h-[525px]">
                <div class="p-4 border-b border-zinc-900 bg-black/20">
                    <h2 class="text-xs font-bold uppercase tracking-widest">Historial Sesión</h2>
                </div>
                <div id="gift-history" class="flex-1 overflow-y-auto p-3 space-y-2 text-[11px]"></div>
            </section>
        </div>
    </main>

    <script>
        const socket = io();
        lucide.createIcons();

        const loader = document.getElementById('loader');
        const btnConnect = document.getElementById('btn-connect');
        const btnDisconnect = document.getElementById('btn-disconnect');
        const statusText = document.getElementById('connection-status');

        // --- MANEJO DE CARGA ---
        btnConnect.onclick = () => {
            const username = document.getElementById('username').value;
            const key = document.getElementById('key').value;
            if(!username) return alert("Ingresa tu usuario de TikTok");
            
            // Mostrar pantalla de carga
            loader.style.display = 'flex';
            socket.emit("startConnection", { username, key });
        };

        socket.on("status", (status) => {
            // Ocultar carga al recibir respuesta
            loader.style.display = 'none';

            if (status === "connected") {
                statusText.innerText = "En Línea";
                statusText.classList.replace('text-red-500', 'text-green-500');
                btnConnect.classList.add('hidden');
                btnDisconnect.classList.remove('hidden');
                socket.emit("getActions", document.getElementById('username').value);
            } else {
                statusText.innerText = "Desconectado";
                statusText.classList.replace('text-green-500', 'text-red-500');
                btnConnect.classList.remove('hidden');
                btnDisconnect.classList.add('hidden');
                if(status === "error") alert("Error al conectar con TikTok. Revisa el usuario.");
            }
        });

        // --- LÓGICA DE FEEDS (CHAT Y REGALOS) ---
        socket.on("chat", (data) => {
            const div = document.createElement('div');
            div.className = "bg-zinc-900/50 p-3 rounded-lg border-l-2 border-purple-500 animate-in fade-in slide-in-from-left-4";
            div.innerHTML = `<span class="text-purple-400 font-bold text-xs">${data.user}:</span> <p class="text-sm text-zinc-300">${data.message}</p>`;
            document.getElementById('chat-container').prepend(div);
            speak(data.user + " dice " + data.message);
        });

        socket.on("gift", (data) => {
            // Alerta Central
            const alertDiv = document.createElement('div');
            alertDiv.className = "bg-green-500/10 border border-green-500/40 p-4 rounded-xl flex justify-between items-center shadow-[0_0_15px_rgba(57,255,20,0.1)]";
            alertDiv.innerHTML = `
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-green-500 flex items-center justify-center text-black font-black">!</div>
                    <div><b class="text-white">${data.user}</b><p class="text-[10px] text-green-500 uppercase">Envió ${data.gift}</p></div>
                </div>
                <span class="text-2xl font-black text-green-400">x${data.amount}</span>
            `;
            document.getElementById('gift-container').prepend(alertDiv);

            // Historial
            const hist = document.createElement('div');
            hist.className = "p-2 bg-zinc-900/30 rounded border border-zinc-800 flex justify-between";
            hist.innerHTML = `<span>${data.user}</span> <span class="text-purple-500">x${data.amount}</span>`;
            document.getElementById('gift-history').prepend(hist);
        });

        // --- TTS ---
        let voices = [];
        function initVoices() {
            voices = window.speechSynthesis.getVoices();
            document.getElementById('tts-voice').innerHTML = voices.map((v, i) => `<option value="${i}">${v.name}</option>`).join('');
        }
        window.speechSynthesis.onvoiceschanged = initVoices;

        function speak(t) {
            if(!document.getElementById('tts-enabled').checked) return;
            const m = new SpeechSynthesisUtterance(t);
            m.voice = voices[document.getElementById('tts-voice').value];
            m.volume = document.getElementById('tts-volume').value;
            window.speechSynthesis.speak(m);
        }

        // --- GESTIÓN DE EVENTOS ---
        document.getElementById('btn-save-action').onclick = () => {
            const username = document.getElementById('username').value;
            const action = { gift: document.getElementById('gift-select').value, file: document.getElementById('sound-file').value };
            if(!action.file) return alert("Nombre de archivo mp3 requerido");
            socket.emit("saveAction", { username, action });
            document.getElementById('sound-file').value = "";
        };

        socket.on("actionsUpdated", (actions) => {
            document.getElementById('actions-list').innerHTML = actions.map((a, i) => `
                <div class="flex justify-between items-center bg-black/40 p-3 rounded-lg border border-zinc-800">
                    <div class="text-xs"><b>${a.gift}</b><br><span class="text-zinc-500">${a.file}</span></div>
                    <button onclick="deleteAction(${i})" class="text-red-500 hover:scale-110 transition-transform"><i data-lucide="trash-2" class="w-4"></i></button>
                </div>
            `).join('');
            lucide.createIcons();
        });

        function deleteAction(index) {
            socket.emit("deleteAction", { username: document.getElementById('username').value, index });
        }

        btnDisconnect.onclick = () => { socket.emit("disconnectLive"); };

        fetch('/gift-list').then(r => r.json()).then(d => {
            document.getElementById('gift-select').innerHTML = d.map(g => `<option value="${g.name}">${g.name}</option>`).join('');
        });

        socket.on("triggerSound", (f) => {
            const a = new Audio("/" + f);
            a.volume = document.getElementById('tts-volume').value;
            a.play();
        });
    </script>
</body>
</html>
