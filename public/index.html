<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexora Ultra | Live Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&display=swap');
        
        :root {
            --purple: #8A2BE2;
            --green: #39FF14;
            --bg: #050507;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background-color: var(--bg);
            color: #efefef;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% -20%, #1a0b2e 0%, var(--bg) 80%);
        }

        /* --- EFECTO DE BRILLO AL PASAR EL MOUSE --- */
        .glass {
            background: rgba(15, 15, 22, 0.9);
            backdrop-filter: blur(12px);
            border-radius: 16px;
            border: 1px solid rgba(138, 43, 226, 0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .glass:hover {
            border-color: var(--green);
            box-shadow: 0 0 30px rgba(57, 255, 20, 0.15);
            transform: translateY(-3px);
        }

        /* --- PANTALLA DE CARGA --- */
        #loader {
            position: fixed;
            inset: 0;
            background: rgba(5, 5, 7, 0.98);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .spinner {
            width: 70px;
            height: 70px;
            border: 4px solid rgba(138, 43, 226, 0.1);
            border-left-color: var(--purple);
            border-right-color: var(--green);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-text {
            margin-top: 20px;
            letter-spacing: 4px;
            animation: pulse-text 1.5s infinite;
            color: var(--purple);
            font-weight: bold;
        }

        @keyframes pulse-text {
            0%, 100% { opacity: 1; text-shadow: 0 0 10px var(--purple); }
            50% { opacity: 0.3; }
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: linear-gradient(var(--purple), var(--green)); border-radius: 10px; }
    </style>
</head>
<body class="p-6">

    <div id="loader">
        <div class="spinner"></div>
        <div class="loading-text uppercase italic">Sincronizando Sistema...</div>
    </div>

    <nav class="max-w-[1700px] mx-auto mb-8 flex items-center justify-between glass p-6">
        <div class="flex items-center gap-8">
            <div class="relative group">
                <div class="absolute -inset-3 bg-gradient-to-r from-purple-600 via-green-400 to-purple-600 rounded-full blur-xl opacity-20 group-hover:opacity-50 transition duration-1000"></div>
                <img src="/Logo.png" alt="Nexora Logo" class="relative h-32 w-32 object-contain rounded-full bg-black/50 p-2 border border-white/20 shadow-2xl transition-all duration-500 group-hover:scale-110" onerror="this.src='https://via.placeholder.com/120?text=LOGO'">
            </div>
            
            <div class="flex flex-col">
                <h1 class="text-5xl font-black italic tracking-tighter leading-none">NEXORA <span class="text-purple-500">ULTRA</span></h1>
                <div class="flex items-center gap-3 mt-3">
                    <div id="status-pulse" class="w-3 h-3 rounded-full bg-red-500 transition-all duration-500"></div>
                    <span id="connection-status" class="text-xs uppercase tracking-[5px] text-red-500 font-bold italic">Desconectado</span>
                </div>
            </div>
        </div>

        <div class="flex gap-4 items-center">
            <div class="flex flex-col gap-1">
                <input id="username" type="text" placeholder="@usuario" class="bg-black/60 border border-zinc-800 px-4 py-2 rounded-lg text-sm focus:border-purple-500 outline-none w-64 transition-all font-medium">
                <input id="key" type="password" placeholder="Access Key" class="bg-black/60 border border-zinc-800 px-4 py-2 rounded-lg text-sm focus:border-purple-500 outline-none w-64 transition-all font-medium">
            </div>
            <button id="btn-connect" class="bg-purple-600 hover:bg-green-500 text-white hover:text-black px-12 py-6 rounded-xl font-black text-sm transition-all duration-300 shadow-lg shadow-purple-500/20 uppercase tracking-widest active:scale-95">Conectar</button>
            <button id="btn-disconnect" class="hidden bg-zinc-900 border border-red-600 text-red-500 hover:bg-red-600 hover:text-white px-12 py-6 rounded-xl font-black text-sm transition-all duration-300 uppercase tracking-widest active:scale-95">Salir</button>
        </div>
    </nav>

    <main class="max-w-[1700px] mx-auto grid grid-cols-12 gap-8">
        <div class="col-span-12 lg:col-span-3 space-y-8">
            <section class="glass p-6">
                <h2 class="text-green-400 font-bold uppercase text-xs mb-4 flex items-center gap-2 italic tracking-widest"><i data-lucide="zap" class="w-4"></i> Crear Evento</h2>
                <div class="space-y-4">
                    <select id="gift-select" class="w-full bg-black/40 border border-zinc-800 p-3 rounded-lg text-sm outline-none focus:border-green-400"></select>
                    <input id="sound-file" type="text" placeholder="nombre_archivo.mp3" class="w-full bg-black/40 border border-zinc-800 p-3 rounded-lg text-sm outline-none focus:border-purple-500">
                    <button id="btn-save-action" class="w-full bg-white text-black font-bold py-3 rounded-lg text-xs uppercase hover:bg-green-500 transition-colors">Vincular Sonido</button>
                </div>
            </section>
            <section class="glass p-6 h-[400px] flex flex-col">
                <h2 class="text-purple-400 font-bold uppercase text-xs mb-4 italic tracking-widest">Eventos Activos</h2>
                <div id="actions-list" class="flex-1 overflow-y-auto space-y-2 pr-2"></div>
            </section>
        </div>

        <div class="col-span-12 lg:col-span-6 grid grid-cols-1 md:grid-cols-2 gap-8 h-[700px]">
            <div class="glass flex flex-col">
                <div class="p-4 border-b border-zinc-900 flex justify-between items-center bg-black/20">
                    <span class="text-xs font-bold tracking-widest italic"><i data-lucide="message-square" class="inline w-3 mr-1 text-purple-500"></i> CHAT</span>
                    <input type="checkbox" id="tts-enabled" checked class="accent-green-500 h-4 w-4 cursor-pointer">
                </div>
                <div id="chat-container" class="flex-1 overflow-y-auto p-4 space-y-4"></div>
            </div>
            <div class="glass flex flex-col">
                <div class="p-4 border-b border-zinc-900 bg-black/20">
                    <span class="text-xs font-bold tracking-widest text-green-400 italic"><i data-lucide="star" class="inline w-3 mr-1"></i> REGALOS RECIENTES</span>
                </div>
                <div id="gift-container" class="flex-1 overflow-y-auto p-4 space-y-4"></div>
            </div>
        </div>

        <div class="col-span-12 lg:col-span-3 space-y-8">
            <section class="glass p-6">
                <h2 class="text-xs font-bold uppercase mb-4 text-zinc-500 italic">Control de Voz</h2>
                <select id="tts-voice" class="w-full bg-black/40 border border-zinc-800 p-2 rounded text-[11px] mb-3 outline-none"></select>
                <input id="tts-volume" type="range" min="0" max="1" step="0.1" value="0.7" class="w-full accent-purple-600 cursor-pointer">
            </section>
            <section class="glass flex flex-col h-[525px]">
                <div class="p-4 border-b border-zinc-900 bg-black/20">
                    <h2 class="text-xs font-bold uppercase tracking-widest italic">Historial Sesión</h2>
                </div>
                <div id="gift-history" class="flex-1 overflow-y-auto p-3 space-y-2 text-[11px]"></div>
            </section>
        </div>
    </main>

    <script>
        const socket = io();
        lucide.createIcons();

        const loader = document.getElementById('loader');
        const btnConnect = document.getElementById('btn-connect');
        const btnDisconnect = document.getElementById('btn-disconnect');
        const statusText = document.getElementById('connection-status');
        const statusPulse = document.getElementById('status-pulse');

        // FUNCIÓN PARA SONIDO DE CONEXIÓN (SINTETIZADOR)
        function playBootSound() {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = 'square';
            osc.connect(gain);
            gain.connect(ctx.destination);
            gain.gain.setValueAtTime(0, ctx.currentTime);
            gain.gain.linearRampToValueAtTime(0.1, ctx.currentTime + 0.05);
            gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 1);
            osc.frequency.setValueAtTime(150, ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(600, ctx.currentTime + 0.5);
            osc.start();
            osc.stop(ctx.currentTime + 1);
        }

        btnConnect.onclick = () => {
            const username = document.getElementById('username').value;
            const key = document.getElementById('key').value;
            if(!username) return alert("Ingresa tu usuario");
            loader.style.display = 'flex';
            socket.emit("startConnection", { username, key });
        };

        socket.on("status", (status) => {
            loader.style.display = 'none';
            if (status === "connected") {
                playBootSound(); // REPRODUCIR SONIDO AL CONECTAR
                statusText.innerText = "CONECTADO";
                statusText.className = "text-xs uppercase tracking-[5px] text-green-500 font-bold italic";
                statusPulse.className = "w-3 h-3 rounded-full bg-green-500 animate-ping";
                btnConnect.classList.add('hidden');
                btnDisconnect.classList.remove('hidden');
                socket.emit("getActions", document.getElementById('username').value);
            } else {
                statusText.innerText = "Desconectado";
                statusText.className = "text-xs uppercase tracking-[5px] text-red-500 font-bold italic";
                statusPulse.className = "w-3 h-3 rounded-full bg-red-500";
                btnConnect.classList.remove('hidden');
                btnDisconnect.classList.add('hidden');
            }
        });

        socket.on("chat", (data) => {
            const div = document.createElement('div');
            div.className = "bg-zinc-900/50 p-3 rounded-lg border-l-2 border-purple-500 animate-in fade-in slide-in-from-left-4";
            div.innerHTML = `<span class="text-purple-400 font-bold text-xs">${data.user}:</span> <p class="text-sm text-zinc-300">${data.message}</p>`;
            document.getElementById('chat-container').prepend(div);
            speak(data.user + " dice " + data.message);
        });

        socket.on("gift", (data) => {
            const alertDiv = document.createElement('div');
            alertDiv.className = "bg-green-500/10 border border-green-500/40 p-4 rounded-xl flex justify-between items-center shadow-[0_0_15px_rgba(57,255,20,0.1)]";
            alertDiv.innerHTML = `<div class="flex items-center gap-3"><div class="w-10 h-10 rounded-full bg-green-500 flex items-center justify-center text-black font-black">!</div><div><b class="text-white">${data.user}</b><p class="text-[10px] text-green-500 uppercase">Envió ${data.gift}</p></div></div><span class="text-2xl font-black text-green-400">x${data.amount}</span>`;
            document.getElementById('gift-container').prepend(alertDiv);
            const hist = document.createElement('div');
            hist.className = "p-2 bg-zinc-900/30 rounded border border-zinc-800 flex justify-between";
            hist.innerHTML = `<span>${data.user}</span> <span class="text-purple-500 font-bold">x${data.amount}</span>`;
            document.getElementById('gift-history').prepend(hist);
        });

        let voices = [];
        function initVoices() {
            voices = window.speechSynthesis.getVoices();
            document.getElementById('tts-voice').innerHTML = voices.map((v, i) => `<option value="${i}">${v.name}</option>`).join('');
        }
        window.speechSynthesis.onvoiceschanged = initVoices;
        function speak(t) {
            if(!document.getElementById('tts-enabled').checked) return;
            window.speechSynthesis.cancel();
            const m = new SpeechSynthesisUtterance(t);
            m.voice = voices[document.getElementById('tts-voice').value];
            m.volume = document.getElementById('tts-volume').value;
            window.speechSynthesis.speak(m);
        }

        document.getElementById('btn-save-action').onclick = () => {
            const username = document.getElementById('username').value;
            const action = { gift: document.getElementById('gift-select').value, file: document.getElementById('sound-file').value };
            if(!action.file) return alert("Falta el archivo mp3");
            socket.emit("saveAction", { username, action });
            document.getElementById('sound-file').value = "";
        };

        socket.on("actionsUpdated", (actions) => {
            document.getElementById('actions-list').innerHTML = actions.map((a, i) => `<div class="flex justify-between items-center bg-black/40 p-3 rounded-lg border border-zinc-800 transition-all hover:border-purple-500/50"><div class="text-xs"><b>${a.gift}</b><br><span class="text-zinc-500 font-mono">${a.file}</span></div><button onclick="deleteAction(${i})" class="text-red-500 hover:scale-125 transition-transform"><i data-lucide="trash-2" class="w-4"></i></button></div>`).join('');
            lucide.createIcons();
        });

        function deleteAction(index) {
            socket.emit("deleteAction", { username: document.getElementById('username').value, index });
        }

        btnDisconnect.onclick = () => { socket.emit("disconnectLive"); };
        fetch('/gift-list').then(r => r.json()).then(d => { document.getElementById('gift-select').innerHTML = d.map(g => `<option value="${g.name}">${g.name}</option>`).join(''); });
        socket.on("triggerSound", (f) => { const a = new Audio("/" + f); a.volume = document.getElementById('tts-volume').value; a.play(); });
    </script>
</body>
</html>
