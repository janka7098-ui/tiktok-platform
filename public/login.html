<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lexora Interactive</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}

body{
background:#050507;
color:#eee;
background-image: radial-gradient(circle at 50% -20%, #1a0b2e 0%, #050507 80%);
}

/* HEADER */
.header{
padding:20px;
border-radius:16px;
background: rgba(15,15,25,0.8);
backdrop-filter: blur(12px);
border:1px solid rgba(0,255,255,0.2);
box-shadow:0 0 20px rgba(0,0,0,0.8);
font-size:22px;
font-weight:800;
letter-spacing:2px;
color:#00ffff;
margin:20px;
}

/* CONTAINER */
.container{
padding:20px;
max-width:1100px;
margin:auto;
}

/* INPUTS */
input, select{
padding:12px;
border-radius:10px;
border:1px solid rgba(255,255,255,0.08);
background:rgba(0,0,0,0.4);
color:white;
outline:none;
transition:0.2s;
}

input:focus, select:focus{
border-color:#00ffff;
box-shadow:0 0 10px rgba(0,255,255,0.3);
}

/* SEARCH */
.search{
width:100%;
margin:20px 0;
}

/* USER INPUT */
.user-input{
width:100%;
margin-bottom:10px;
}

/* PANEL */
.add-box{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;
padding:15px;
border-radius:16px;
background: rgba(15,15,25,0.7);
border:1px solid rgba(138,43,226,0.2);
backdrop-filter: blur(10px);
}

/* SELECTOR */
.selector{
position:relative;
width:220px;
}

.selected{
background:rgba(0,0,0,0.5);
padding:12px;
border-radius:10px;
cursor:pointer;
border:1px solid rgba(255,255,255,0.08);
}

.dropdown{
position:absolute;
width:100%;
max-height:250px;
overflow-y:auto;
background:#0b0b15;
border-radius:12px;
margin-top:5px;
display:none;
border:1px solid rgba(0,255,255,0.2);
z-index:10;
}

.item{
display:flex;
align-items:center;
gap:10px;
padding:10px;
cursor:pointer;
transition:0.2s;
}

.item:hover{
background:rgba(0,255,255,0.1);
}

.item img{
width:30px;
height:30px;
}

/* TABLA */
.table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

.table th{
padding:12px;
text-align:left;
color:#00ffff;
font-size:12px;
letter-spacing:1px;
}

.row td{
padding:12px;
background:rgba(10,10,20,0.7);
border-bottom:1px solid rgba(255,255,255,0.05);
}

/* BOTONES */
.btn{
padding:10px 14px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:700;
transition:0.2s;
}

.test{
background:#00ffff;
color:black;
}

.save{
margin-top:20px;
width:100%;
padding:14px;
border-radius:12px;
background:linear-gradient(90deg,#8A2BE2,#00ffff);
font-weight:800;
border:none;
color:white;
}
</style>
</head>

<body>

<div class="header">
LEXORA <span style="color:#8A2BE2">INTERACTIVE</span>
</div>

<div class="container">

<input id="robloxUser" class="user-input" placeholder="Usuario Roblox (o TODOS)">
<input id="adminCode" class="user-input" placeholder="Código admin (solo TODOS)">

<input class="search" placeholder="Buscar evento..." onkeyup="filter()" id="search">

<div class="add-box">

<select id="type">
<option value="gift">🎁 Gift</option>
<option value="like">❤️ Like</option>
<option value="follow">➕ Follow</option>
</select>

<div id="giftSelector" class="selector">
<div class="selected" onclick="toggleDropdown()">
<span id="selectedText">Seleccionar regalo</span>
</div>
<div id="dropdown" class="dropdown"></div>
</div>

<input id="newParts" placeholder="Parts (-5)">
<input id="targetLikes" placeholder="Cada cuantos likes">
<button class="btn test" onclick="add()">Agregar</button>

</div>

<table class="table" id="table"></table>

<button class="save" onclick="save()">Guardar</button>

</div>

<script>

let allEvents = JSON.parse(localStorage.getItem("eventsByUser")) || {}
let selectedGift = ""
let giftImages = {}

function getUser(){
const user = document.getElementById("robloxUser").value.trim()
const code = document.getElementById("adminCode").value.trim()

if(user.toLowerCase() === "todos"){
if(code !== "admin24"){
alert("Código admin incorrecto 🚫")
return null
}
return "ALL_USERS"
}
return user
}

function toggleDropdown(){
const d = document.getElementById("dropdown")
d.style.display = d.style.display === "block" ? "none" : "block"
}

async function loadGifts(){
const res = await fetch("/gift-list")
const gifts = await res.json()
const dropdown = document.getElementById("dropdown")

gifts.forEach(g=>{
giftImages[g.name.toLowerCase()] = g.image

const div = document.createElement("div")
div.className = "item"
div.innerHTML = `<img src="${g.image}"><span>${g.name}</span>`

div.onclick = ()=>{
selectedGift = g.name
document.getElementById("selectedText").innerText = g.name
dropdown.style.display = "none"
}

dropdown.appendChild(div)
})
}

loadGifts()

const table = document.getElementById("table")

function render(){

const user = getUser()

table.innerHTML = `
<tr>
<th>Usuario</th>
<th>Tipo</th>
<th>Nombre</th>
<th>Parts</th>
<th>Meta</th>
<th>Test</th>
</tr>
`

if(!user || !allEvents[user]) return

Object.keys(allEvents[user]).forEach(name=>{

const e = allEvents[user][name]
const img = giftImages[name?.toLowerCase()]

const row = document.createElement("tr")
row.className="row"

row.innerHTML = `
<td>${user}</td>
<td>${e.type}</td>
<td>${img?`<img src="${img}" style="width:25px">`:""} ${name}</td>
<td><input value="${e.parts}" onchange="update('${name}',this.value)"></td>
<td>${e.targetLikes||"-"}</td>
<td><input id="test-${name}" value="1">
<button class="btn test" onclick="test('${name}')">TEST</button></td>
`

table.appendChild(row)
})
}

function add(){
const user = getUser()
if(!user) return

const type = document.getElementById("type").value
const parts = Number(document.getElementById("newParts").value)
const targetLikes = Number(document.getElementById("targetLikes").value)

if(!allEvents[user]) allEvents[user] = {}

let key = type==="gift"?selectedGift:type==="like"?"like_"+targetLikes:"follow"

allEvents[user][key]={
type,
parts,
targetLikes,
robloxUser:user
}

render()
}

function update(name,value){
const user=getUser()
allEvents[user][name].parts=Number(value)
}

function test(name){
const user=getUser()
const e=allEvents[user][name]
const amount=Number(document.getElementById("test-"+name).value)

fetch("/test",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
gift:name,
repeatCount:amount,
parts:e.parts,
type:e.type,
targetLikes:e.targetLikes,
robloxUser:user
})
})
}

function save(){
localStorage.setItem("eventsByUser",JSON.stringify(allEvents))
alert("Guardado 🔥")
}

function filter(){
const s=document.getElementById("search").value.toLowerCase()
document.querySelectorAll(".row").forEach(r=>{
r.style.display=r.innerText.toLowerCase().includes(s)?"":"none"
})
}

document.getElementById("robloxUser").addEventListener("input",render)

render()

</script>

</body>
</html>
