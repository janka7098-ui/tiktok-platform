<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexora - Panel Profesional</title>
    <link rel="icon" type="image/png" href="public/Logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="/socket.io/socket.io.js"></script>

    <style>
        :root {
            --bg-deep: #0F0A1A;
            --bg-card: #1A112A;
            --neon-green: #00FFAB;
            --neon-purple: #8A2EFF;
            --text-main: #FFFFFF;
            --text-muted: #B8B0CC;
            --border-color: rgba(138, 46, 255, 0.2);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 260px;
            background-color: var(--bg-deep);
            border-right: 1px solid var(--border-color);
            padding: 25px;
            display: flex;
            flex-direction: column;
        }

        .logo-box { text-align: center; margin-bottom: 40px; }
        .logo-box img { width: 120px; filter: drop-shadow(0 0 10px var(--neon-purple)); }

        .menu-btn {
            width: 100%; padding: 12px 15px; margin-bottom: 10px;
            background: transparent; border-radius: 8px; color: var(--text-muted);
            cursor: pointer; transition: 0.3s; border: none;
            text-align: left; font-weight: 600; font-size: 0.9rem;
        }

        .menu-btn:hover, .menu-btn.active {
            background: linear-gradient(90deg, rgba(138,46,255,0.1) 0%, transparent 100%);
            color: var(--neon-green);
            border-left: 4px solid var(--neon-green);
        }

        /* --- MAIN CONTENT --- */
        .main-content { flex: 1; display: flex; flex-direction: column; overflow-y: auto; }

        header {
            background-color: var(--bg-card);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
        }

        .status-badge {
            padding: 6px 16px; border-radius: 20px; font-size: 0.8rem; font-weight: 800;
            border: 1px solid #ff4d4d; color: #ff4d4d; transition: 0.4s;
        }
        .status-badge.connected { border-color: var(--neon-green); color: var(--neon-green); box-shadow: 0 0 10px var(--neon-green); }

        /* --- SECCIONES Y CARDS --- */
        .section { display: none; padding: 40px; }
        .section.active { display: block; }

        .card {
            background-color: var(--bg-card); padding: 25px; border-radius: 12px;
            border: 1px solid var(--border-color); margin-bottom: 20px;
        }

        .card-event {
            background: rgba(255,255,255,0.03); padding: 12px; border-radius: 8px;
            margin-bottom: 10px; border-left: 4px solid var(--neon-purple);
        }

        input, select {
            width: 100%; padding: 12px; margin-bottom: 15px;
            background: #120b24; border: 1px solid var(--border-color);
            border-radius: 8px; color: white; outline: none;
        }

        /* --- BOTÓN CON CARGA --- */
        .btn-primary {
            width: 100%; padding: 14px; background: linear-gradient(90deg, var(--neon-purple), #6a1bc2);
            border: none; border-radius: 10px; color: white; font-weight: 800;
            cursor: pointer; transition: 0.3s; position: relative;
        }
        .btn-primary:hover { transform: translateY(-2px); opacity: 0.9; }

        .btn-primary.loading { color: transparent; pointer-events: none; }
        .btn-primary.loading::after {
            content: ""; position: absolute; width: 20px; height: 20px;
            top: 50%; left: 50%; margin: -10px 0 0 -10px;
            border: 3px solid rgba(255,255,255,0.3); border-top-color: #fff;
            border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* --- PERFIL --- */
        .profile-frame {
            width: 42px; height: 42px; border-radius: 50%;
            border: 2px solid var(--neon-green); display: none; overflow: hidden;
        }
        .profile-frame img { width: 100%; height: 100%; object-fit: cover; }

        /* --- TTS SWITCH --- */
        .tts-switch {
            width: 50px; height: 26px; background: #333;
            border-radius: 50px; position: relative; cursor: pointer;
        }
        .tts-switch.active { background: var(--neon-green); }
        .tts-circle {
            width: 20px; height: 20px; background: white; border-radius: 50%;
            position: absolute; top: 3px; left: 3px; transition: 0.3s;
        }
        .tts-switch.active .tts-circle { left: 27px; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo-box"><img src="public/Logo.png" alt="Nexora"></div>
        <button class="menu-btn active" onclick="showSection('conexion', this)">🔌 Conexión</button>
        <button class="menu-btn" onclick="showSection('chat', this)">💬 Chat</button>
        <button class="menu-btn" onclick="showSection('gifts', this)">🎁 Regalos</button>
        <button class="menu-btn" onclick="showSection('actions', this)">⚡ Acciones</button>
    </aside>

    <div class="main-content">
        <header>
            <div id="statusBadge" class="status-badge">● DESCONECTADO</div>
            
            <div style="display:flex; align-items:center; gap:15px;">
                <div id="ttsToggle" class="tts-switch active" onclick="toggleTTS()">
                    <div class="tts-circle"></div>
                </div>
                
                <select id="voiceSelector" style="width:180px; margin:0;"></select>

                <div id="profileFrame" class="profile-frame">
                    <img id="profileImage" src="">
                </div>
                
                <span id="connectedUser" style="color:var(--neon-green); font-weight:bold; font-size:0.9rem;"></span>
                <button onclick="disconnectLive()" style="background:none; border:1px solid #ff4d4d; color:#ff4d4d; padding:6px 12px; border-radius:8px; cursor:pointer; font-size:0.7rem; font-weight:bold;">DESCONECTAR</button>
            </div>
        </header>

        <main>
            <div id="conexion" class="section active">
                <h1>🔌 Vincular TikTok LIVE</h1>
                <div class="card" style="max-width: 500px; margin-top:20px;">
                    <input id="tiktokUser" placeholder="Usuario TikTok sin @">
                    <input id="accessKey" type="password" placeholder="Clave de acceso">
                    <button id="btnConnect" class="btn-primary" onclick="connectTikTok()">CONECTAR AHORA</button>
                </div>
            </div>

            <div id="chat" class="section">
                <h1>💬 Chat en tiempo real</h1>
                <div id="chat-list" style="margin-top:20px;"></div>
            </div>

            <div id="gifts" class="section">
                <h1>🎁 Historial de Regalos</h1>
                <div id="gifts-list" style="margin-top:20px;"></div>
            </div>

            <div id="actions" class="section">
                <h1>⚡ Configurar Acciones por Regalo</h1>
                <div class="card" style="max-width: 500px; margin-top:20px;">
                    <input id="actionGift" placeholder="Nombre del regalo (ej: Rosa)">
                    <input id="actionFile" placeholder="Ruta del sonido (ej: /media/susto.mp3)">
                    <button class="btn-primary" onclick="createAction()">GUARDAR ACCIÓN</button>
                </div>
                <h3>Acciones Activas</h3>
                <div id="actionList" style="margin-top:15px;"></div>
            </div>
        </main>
    </div>

    <script>
        const socket = io();
        let tempUsername = "";
        let ttsEnabled = true;
        let selectedVoice = null;

        function showSection(id, btn) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
        }

        // --- CONEXIÓN Y CARGA ---
        function connectTikTok() {
            const btn = document.getElementById("btnConnect");
            const username = document.getElementById("tiktokUser").value.trim();
            const key = document.getElementById("accessKey").value.trim();
            
            if(!username || !key) return alert("Completa los datos");

            btn.classList.add("loading");
            tempUsername = username;

            socket.emit("startConnection", { username, key });
            socket.emit("getActions", username);
        }

        socket.on("status", (status) => {
            document.getElementById("btnConnect").classList.remove("loading");
            const badge = document.getElementById("statusBadge");
            
            if(status === "connected") {
                badge.innerText = "● CONECTADO";
                badge.classList.add("connected");
                document.getElementById("connectedUser").innerText = "@" + tempUsername;
            } else if(status === "disconnected") {
                badge.innerText = "● DESCONECTADO";
                badge.classList.remove("connected");
                document.getElementById("profileFrame").style.display = "none";
                document.getElementById("connectedUser").innerText = "";
            } else if(status === "invalid_key") {
                alert("Clave de acceso inválida");
            }
        });

        socket.on("connectedUserData", (data) => {
            if(data.profilePictureUrl) {
                document.getElementById("profileImage").src = data.profilePictureUrl;
                document.getElementById("profileFrame").style.display = "block";
            }
        });

        // --- VOCES Y TTS ---
        function loadVoices() {
            const voices = speechSynthesis.getVoices();
            const selector = document.getElementById("voiceSelector");
            selector.innerHTML = "";
            voices.forEach((v, i) => {
                const opt = document.createElement("option");
                opt.value = i; opt.textContent = v.name;
                selector.appendChild(opt);
            });
            if(voices.length > 0) selectedVoice = voices[0];
        }
        speechSynthesis.onvoiceschanged = loadVoices;
        window.onload = loadVoices;

        function toggleTTS() {
            ttsEnabled = !ttsEnabled;
            document.getElementById("ttsToggle").classList.toggle("active");
        }

        function speak(text) {
            if(!ttsEnabled) return;
            const msg = new SpeechSynthesisUtterance(text);
            if(selectedVoice) msg.voice = selectedVoice;
            window.speechSynthesis.speak(msg);
        }

        // --- CHAT Y REGALOS ---
        socket.on("chat", (data) => {
            const div = document.createElement("div");
            div.className = "card-event";
            div.innerHTML = `<strong>${data.user}:</strong> ${data.message}`;
            document.getElementById("chat-list").prepend(div);
            speak(`${data.user} dice ${data.message}`);
        });

        socket.on("gift", (data) => {
            const div = document.createElement("div");
            div.className = "card-event";
            div.style.borderLeftColor = "var(--neon-green)";
            div.innerHTML = `🎁 <strong>${data.user}</strong> envió ${data.gift} x${data.amount}`;
            document.getElementById("gifts-list").prepend(div);
        });

        // --- ACCIONES ---
        function createAction() {
            const gift = document.getElementById("actionGift").value.trim();
            const file = document.getElementById("actionFile").value.trim();
            if(!gift || !file) return alert("Completa los campos de acción");

            socket.emit("createAction", { username: tempUsername, gift, file });
            
            // Agregar a la lista visualmente
            const div = document.createElement("div");
            div.className = "card-event";
            div.style.borderLeftColor = "var(--neon-purple)";
            div.innerHTML = `⚡ Regalo: <b>${gift}</b> → Sonido: <i>${file}</i>`;
            document.getElementById("actionList").appendChild(div);

            document.getElementById("actionGift").value = "";
            document.getElementById("actionFile").value = "";
        }

        function disconnectLive() { socket.emit("disconnectLive"); }
    </script>
</body>
</html>
